module: body_lines
deps: []
types:
  - name: PromptBody
    description: "Value holding the prose body of a prompt document: 'body_start_line' (absolute 0-based document line index where the body begins) and 'lines' (the body's lines, in order, as owned strings)."
functions:
  - name: prompt_body_lines
    signature: "prompt_body_lines(raw: string) -> PromptBody"
    behavior: Splits raw document text into lines on newline characters, stripping a trailing carriage return from each line so CRLF and LF documents split identically; splitting never drops a line (no trailing newline still yields the last line, a trailing newline yields a final empty line). Frontmatter is recognized when the first line, compared after stripping trailing whitespace, equals '---' and some later line, compared the same way, also equals '---'. When both delimiters are present, body_start_line is the index of the first line after the closing '---' and lines is everything after it; if the closing delimiter is the last line, lines is a single-element list containing an empty string. When the first line is not '---', or no closing '---' exists after it, body_start_line is 0 and lines is the entire document's lines.
  - name: body_line_for_doc_line
    signature: "body_line_for_doc_line(body: PromptBody, doc_line: i64) -> Option<usize>"
    behavior: Converts an absolute, 0-based document line number (which may be negative or arbitrarily large/small, including i64::MIN/MAX) into a 1-based line number within the body, computed as doc_line - body_start_line + 1. Returns that value only if it is at least 1 and no greater than the number of body lines; returns nothing (None) for lines before the body starts, past the body's final line, or on arithmetic overflow/underflow during the computation.
  - name: number_lines
    signature: "number_lines(lines: &[string]) -> string"
    behavior: "Renders a slice of lines as a single display string. Each line is prefixed with its 1-based position followed by ': ', and the resulting entries are joined with newline characters. An empty slice renders as the empty string."
tests:
  - name: splits_on_unix_and_windows_newlines
    given: prompt_body_lines called on "a\nb\nc" and on "a\r\nb\r\nc"
    expect: 'both produce identical lines: ["a", "b", "c"]'
  - name: no_trailing_newline_keeps_last_line
    given: raw text "a\nb" with no trailing newline
    expect: lines is ["a", "b"]
  - name: trailing_newline_yields_final_empty_line
    given: raw text "a\nb\n"
    expect: lines is ["a", "b", ""]
  - name: no_frontmatter_body_is_whole_document
    given: raw text "hello\nworld" with no '---' delimiters
    expect: body_start_line is 0 and lines is ["hello", "world"]
  - name: first_line_not_delimiter_means_no_frontmatter
    given: raw text "title\n---\nbody" where the first line is not '---'
    expect: body_start_line is 0 and lines is ["title", "---", "body"]
  - name: missing_closing_delimiter_means_no_frontmatter
    given: "raw text \"---\\nkey: value\\nno closing here\" with an opening '---' but no closing one"
    expect: 'body_start_line is 0 and lines is ["---", "key: value", "no closing here"]'
  - name: frontmatter_is_stripped
    given: 'raw text "---\nkey: value\n---\nline one\nline two"'
    expect: body_start_line is 3 and lines is ["line one", "line two"]
  - name: delimiters_compared_ignoring_trailing_whitespace
    given: 'raw text "---  \nkey: value\n---\t\nbody line" with trailing whitespace on the delimiter lines'
    expect: body_start_line is 3 and lines is ["body line"]
  - name: frontmatter_followed_by_nothing_has_one_empty_body_line
    given: 'raw text "---\nkey: value\n---" where the closing delimiter is the last line'
    expect: body_start_line is 3 and lines is [""]
  - name: body_line_for_doc_line_maps_within_range
    given: 'a PromptBody from "---\nkey: value\n---\nfirst\nsecond" and doc_line values 3 and 4'
    expect: body_line_for_doc_line returns Some(1) for 3 and Some(2) for 4
  - name: body_line_for_doc_line_before_body_is_none
    given: the same PromptBody and doc_line values 0 and 2, which precede the body
    expect: body_line_for_doc_line returns None for both
  - name: body_line_for_doc_line_past_end_is_none
    given: the same PromptBody and doc_line value 5, past the body's final line
    expect: body_line_for_doc_line returns None
  - name: body_line_for_doc_line_handles_negative_and_large_values
    given: a PromptBody from "first\nsecond" (no frontmatter) and doc_line values -5, i64::MAX, and i64::MIN
    expect: body_line_for_doc_line returns None for all three
  - name: number_lines_renders_with_positions
    given: lines ["a", "b"]
    expect: 'number_lines returns "1: a\n2: b"'
  - name: number_lines_empty_slice_is_empty_string
    given: an empty slice of lines
    expect: number_lines returns ""
