module: schemas_frontmatter
deps: []
types:
  - name: PromptTest
    description: "A single behavioral test case parsed from frontmatter. Supports equality comparison and deserialization. Fields: name (string); given (free-form YAML value, defaults to an empty mapping when omitted); expect (free-form YAML value, defaults to an empty mapping when omitted). After validation both given and expect are guaranteed to be YAML mappings.\n"
  - name: Frontmatter
    description: "The validated YAML frontmatter block. Supports equality comparison and deserialization. Fields: module (non-empty string, required); deps (list of strings, defaults to empty); targets (list of strings, defaults to empty); tests (list of PromptTest, defaults to empty); crate_name (optional string, defaults to none, deserialized from the on-disk YAML key `crate` since `crate` is a reserved identifier).\n"
  - name: ParsedPrompt
    description: "The result of parsing a prompt file. Supports equality comparison. Fields: frontmatter (a Frontmatter); body (the cleaned prose body string that follows the closing delimiter).\n"
  - name: FrontmatterError
    description: "The error value returned when parsing fails. Distinguishes: a missing or unclosed frontmatter block; invalid YAML that fails to parse or deserialize (including a missing module key); an empty module value; and a test whose given or expect field is not a mapping (carrying the offending test name and field name). Rendered as a human-readable message; never raised as a panic.\n"
functions:
  - name: parse_frontmatter
    signature: "parse_frontmatter(raw: string) -> Result<ParsedPrompt, FrontmatterError>"
    behavior: "Precondition: raw is the full text of a prompt file. Splits the file into a YAML frontmatter block and a body. The opening delimiter is a literal `---` followed by a line ending (\\n or \\r\\n) at the very start of the file; the closing delimiter is the next line that is exactly `---`. Text between the delimiters is the YAML; text after the closing delimiter and its one consumed trailing line ending is the raw body. An absent opening delimiter or a missing closing `---` line returns an error. A completely empty or null YAML block is treated as an empty mapping. The mapping is deserialized into a Frontmatter applying all field defaults. Postconditions on success: module is a non-empty string (a missing module key or module set to \"\" is an error); every test's given and expect are YAML mappings (any other YAML type is an error); and the body has a single leading blank line removed — if the body begins with whitespace running up to and including a newline, everything up to and including that newline is dropped, otherwise the body is left unchanged. Returns a ParsedPrompt or a FrontmatterError; never panics.\n"
tests:
  - name: parses full frontmatter with test case
    given:
      raw: "---\nmodule: auth/session\ndeps: [auth/tokens]\ntargets: [typescript]\ntests:\n  - name: expired token rejected\n    given: { token: expired }\n    expect: { error: SESSION_EXPIRED }\n---\nManage user sessions. Sessions expire after 30 minutes.\n"
    expect:
      module: auth/session
      deps:
        - auth/tokens
      targets:
        - typescript
      tests_len: 1
      test_name: expired token rejected
      test_given:
        token: expired
      test_expect:
        error: SESSION_EXPIRED
      body_starts_with: Manage user sessions.
  - name: parses minimal frontmatter with defaults
    given:
      raw: "---\nmodule: solo\n---\nBody here.\n"
    expect:
      module: solo
      deps: []
      targets: []
      tests: []
      crate_name: null
      body: "Body here.\n"
  - name: parses crate key into crate_name
    given:
      raw: "---\nmodule: alpha\ncrate: shared\n---\nBody.\n"
    expect:
      module: alpha
      crate_name: shared
  - name: crate_name defaults to none when absent
    given:
      raw: "---\nmodule: solo\n---\nBody here.\n"
    expect:
      crate_name: null
  - name: test given and expect default to empty mapping
    given:
      raw: "---\nmodule: m\ntests:\n  - name: bare test\n---\nBody\n"
    expect:
      test_given: {}
      test_expect: {}
  - name: rejects missing frontmatter entirely
    given:
      raw: no frontmatter here
    expect:
      error: MissingFrontmatter
  - name: rejects missing module key
    given:
      raw: "---\ndeps: []\n---\nbody"
    expect:
      error: InvalidYaml
  - name: rejects empty module value
    given:
      raw: '---
module: ""
---
body'
    expect:
      error: EmptyModule
  - name: rejects missing closing delimiter
    given:
      raw: "---\nmodule: m\nno closing delimiter here\n"
    expect:
      error: MissingFrontmatter
  - name: rejects non-mapping given
    given:
      raw: "---\nmodule: m\ntests:\n  - name: t\n    given: [1, 2]\n---\nbody"
    expect:
      error: InvalidTestField
      field: given
  - name: rejects non-mapping expect
    given:
      raw: "---\nmodule: m\ntests:\n  - name: t\n    expect: 5\n---\nbody"
    expect:
      error: InvalidTestField
      field: expect
  - name: strips single leading blank line from body
    given:
      raw: "---\nmodule: m\n---\n\nActual body.\n"
    expect:
      body: "Actual body.\n"
  - name: does not strip body without leading blank line
    given:
      raw: "---\nmodule: m\n---\nFirst line.\nSecond line.\n"
    expect:
      body: "First line.\nSecond line.\n"
  - name: handles crlf line endings
    given:
      raw: "---\r\nmodule: m\r\n---\r\nBody.\r\n"
    expect:
      module: m
      body: "Body.\r\n"
  - name: empty yaml block treated as empty mapping still requires module
    given:
      raw: "---\n---\nbody"
    expect:
      error: InvalidYaml
