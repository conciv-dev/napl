module: reconcile_derive
deps:
  - drift
  - prompts
  - text_diff
types: []
functions:
  - name: editable_drifted
    signature: "editable_drifted(files: &[DriftedFile]) -> Vec<&DriftedFile>"
    behavior: "Pure function. Given a slice of drifted files, returns references to the subset that qualifies for reconcile: entries whose reason is Edited and whose current content is Some. Excludes Missing entries and Edited entries with current == None. Preserves original relative order. Does not mutate input. No I/O.\n"
  - name: build_reconcile_files
    signature: "build_reconcile_files(files: &[DriftedFile]) -> Vec<ReconcileFile>"
    behavior: "Pure function. Applies the same editability rule as editable_drifted, preserving order, and maps each qualifying DriftedFile to a ReconcileFile. ReconcileFile.file is copied from the drifted file's file field. ReconcileFile.diff is the drifted file's diff when Some (used verbatim, unmodified); when diff is None, it is computed as unified_diff(\"\", current) where current is the drifted file's current content (empty string if current is None, though editable entries always have Some current). Files that are Missing or Edited-without- current contribute nothing to the result. Empty input or input with no qualifying files yields an empty vector. No I/O, no mutation of input.\n"
tests:
  - name: editable_drifted_keeps_edited_with_current_in_order
    given: a list [a.ts (Edited, current=Some), b.ts (Missing), c.ts (Edited, current=None), d.ts (Edited, current=Some)]
    expect: editable_drifted returns [a.ts, d.ts] in that order
  - name: editable_drifted_empty_when_none_qualify
    given: a list [a.ts (Missing), b.ts (Edited, current=None)]
    expect: editable_drifted returns an empty vector
  - name: build_reconcile_files_uses_recorded_diff_verbatim
    given: a single Edited file a.ts with current=Some("a content") and diff=Some("PRERECORDED DIFF")
    expect: build_reconcile_files returns one ReconcileFile with file="a.ts" and diff="PRERECORDED DIFF" unchanged
  - name: build_reconcile_files_computes_diff_when_missing
    given: a single Edited file a.ts with current=Some("new content") and diff=None
    expect: build_reconcile_files returns one ReconcileFile whose diff equals unified_diff("", "new content")
  - name: build_reconcile_files_skips_missing_and_contentless_files
    given: a list [a.ts (Missing), b.ts (Edited, current=None)]
    expect: build_reconcile_files returns an empty vector
  - name: build_reconcile_files_preserves_order
    given: a list [a.ts (Edited, current=Some("a"), diff=Some("diff a")), skip.ts (Missing), b.ts (Edited, current=Some("b"), diff=Some("diff b"))]
    expect: build_reconcile_files returns ReconcileFiles for a.ts then b.ts, in that order
