module: watch_filter
deps: []
types:
  - name: IGNORED_DIRS
    description: 'A public constant ordered array of directory names that are always ignored: exactly ["node_modules", ".napl", ".git"], in that order. Used as the set of names against which path components are matched.
'
functions:
  - name: is_ignored
    signature: "is_ignored(path: Path, root: Path) -> bool"
    behavior: 'Pure predicate with no filesystem access. Computes path relative to root by stripping the root prefix; if path does not start with root, path is used unchanged. Returns true when any component of that (possibly relative) path, compared as a string, exactly equals one of IGNORED_DIRS at any depth; returns false otherwise. A matching name anywhere along the path causes the whole path to be ignored. A file whose extension resembles an ignored name (e.g. a ".napl" file) does not match — only whole path components count.
'
tests:
  - name: node_modules_component_ignored
    given: root=/proj, path=/proj/node_modules/dep.js
    expect: true — node_modules component matches
  - name: dot_napl_component_ignored
    given: root=/proj, path=/proj/.napl/src/rust/x.rs
    expect: true — .napl component matches
  - name: dot_git_component_ignored
    given: root=/proj, path=/proj/.git/HEAD
    expect: true — .git component matches
  - name: nested_ignored_dir_at_any_depth
    given: root=/proj, path=/proj/src/a/.napl/b
    expect: true — nested .napl matches regardless of depth
  - name: napl_file_extension_is_not_a_directory_match
    given: root=/proj, path=/proj/examples/greeting.napl
    expect: false — .napl file extension is not a .napl directory component
  - name: plain_source_file_not_ignored
    given: root=/proj, path=/proj/src/lib.rs
    expect: false — no component is an ignored directory
  - name: path_not_under_root_used_unchanged
    given: root=/proj, paths=/other/node_modules/x and /other/src/x
    expect: true for the first (node_modules matches on unchanged path); false for the second
  - name: ignored_dirs_constant_order
    given: the IGNORED_DIRS constant
    expect: equals ["node_modules", ".napl", ".git"] in that exact order
