module: watch_filter
deps: []
types: []
functions:
  - name: is_ignored
    signature: "is_ignored(path: Path, root: Path) -> bool"
    behavior: 'Computes path relative to root by stripping the root prefix; if path does not start with root, uses path unchanged. Returns true if any component of the resulting path exactly equals one of the entries in IGNORED_DIRS (node_modules, .napl, .git), compared as exact strings, regardless of depth. Returns false otherwise. Pure function: no filesystem access, no side effects, no dependency on other modules. File extensions (e.g. a file literally named "foo.napl") are not treated as directory components and do not trigger a match.
'
tests:
  - name: node_modules_component_ignored
    given: root=/proj, path=/proj/node_modules/dep.js
    expect: "true"
  - name: dot_napl_component_ignored
    given: root=/proj, path=/proj/.napl/src/rust/x.rs
    expect: "true"
  - name: dot_git_component_ignored
    given: root=/proj, path=/proj/.git/HEAD
    expect: "true"
  - name: nested_ignored_dir_at_any_depth
    given: root=/proj, path=/proj/src/a/.napl/b
    expect: "true"
  - name: napl_file_extension_is_not_a_directory_match
    given: root=/proj, path=/proj/examples/greeting.napl
    expect: "false"
  - name: plain_source_file_not_ignored
    given: root=/proj, path=/proj/src/lib.rs
    expect: "false"
  - name: path_not_under_root_used_unchanged
    given: root=/proj, path=/other/node_modules/x (not prefixed by root)
    expect: "true"
  - name: path_not_under_root_used_unchanged_false_case
    given: root=/proj, path=/other/src/x (not prefixed by root)
    expect: "false"
  - name: ignored_dirs_constant_order
    given: the exported IGNORED_DIRS constant
    expect: equals [node_modules, .napl, .git] in that exact order
