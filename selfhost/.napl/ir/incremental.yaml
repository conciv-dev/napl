module: incremental
deps:
  - schemas_line_range
  - schemas_attribution
types:
  - name: BodyLineDiff
    description: 'Result of a line-level diff between two prompt bodies. Public, cloneable, and equality-comparable. Fields: unified (a unified-diff string with 3 lines of context, hunk headers of the form "@@ -oldStart,oldCount +newStart,newCount @@", body lines prefixed by a space for unchanged, "-" for deletions, "+" for insertions, hunks joined by newlines with no trailing newline), changed_old_lines (1-based old-body line numbers of deleted lines, in order), and changed_new_lines (1-based new-body line numbers of inserted lines, in order).'
functions:
  - name: diff_body_lines
    signature: "diff_body_lines(old_body: string, new_body: string) -> BodyLineDiff"
    behavior: "Splits each body into lines on newline, stripping a trailing carriage return from each line (so a trailing newline yields a final empty line). Computes an LCS alignment of the two line sequences into an ordered list of equal/deletion/insertion operations; when the choice between a deletion and an insertion is free, prefers the deletion. Postcondition: changed_old_lines lists the 1-based old-line numbers of deletions in order; changed_new_lines lists the 1-based new-line numbers of insertions in order; unified renders the operations grouped into hunks with 3 lines of context, where a purely-equal run wider than the context splits hunks and changes within 3 operations of each other merge into one hunk. Identical bodies produce empty change lists and an empty unified string."
  - name: select_intersecting_entries
    signature: "select_intersecting_entries(entries: AttributionEntry[], changed_old_lines: usize[]) -> AttributionEntry[]"
    behavior: Returns a cloned copy of each entry whose inclusive prompt range (prompt_lines.start ..= prompt_lines.end, compared as integers) contains at least one line number present in changed_old_lines. Preserves the input order of entries. Entries with no overlapping line are excluded.
  - name: incremental_unlock_list
    signature: "incremental_unlock_list(owned_files: string[], intersecting_entries: AttributionEntry[], target_rel_to_root: string) -> string[]"
    behavior: 'Starts from the owned files, then appends for each intersecting entry the string "{target_rel_to_root}/{entry.file}". Postcondition: the returned vector is sorted ascending and deduplicated. Empty inputs yield an empty list.'
tests:
  - name: splits_lines_and_strips_cr
    given: diff_body_lines of "a\r\nb\r\n" against itself
    expect: changed_old_lines empty, changed_new_lines empty, unified is ""
  - name: identical_bodies_produce_no_changes
    given: diff_body_lines of "Greet a person by name." against itself
    expect: empty changed_old_lines, empty changed_new_lines, unified is ""
  - name: single_line_change_reports_delete_and_insert
    given: diff_body_lines from "Greet a person by name." to "Greet a person by name, loudly."
    expect: changed_old_lines == [1], changed_new_lines == [1], unified contains "-Greet a person by name." and "+Greet a person by name, loudly." and starts with "@@ -1,1 +1,1 @@"
  - name: context_lines_are_included_in_hunk
    given: old "one/two/three/four/five" and new "one/two/CHANGED/four/five" (newline-separated)
    expect: changed_old_lines == [3], changed_new_lines == [3], unified equals "@@ -1,5 +1,5 @@\n one\n two\n-three\n+CHANGED\n four\n five"
  - name: distant_changes_split_into_separate_hunks
    given: 20 lines with line 1 and line 20 changed
    expect: unified contains 2 hunks
  - name: adjacent_changes_merge_into_one_hunk
    given: 8 lines with line 1 and line 8 changed (gap of 6 equal lines)
    expect: unified contains 1 hunk
  - name: prefers_deletion_on_free_choice
    given: diff_body_lines from "a\nx" to "a\ny" (a free delete/insert tie)
    expect: changed_old_lines == [2], changed_new_lines == [2]
  - name: select_intersecting_entries_keeps_only_overlapping_ranges
    given: entries [(1..2,"a.rs"), (3..3,"b.rs"), (5..6,"c.rs")] with changed_old_lines [3, 7]
    expect: one entry selected, its file is "b.rs"
  - name: select_intersecting_entries_preserves_order
    given: entries [(5..5,"z.rs"), (1..1,"a.rs")] with changed_old_lines [1, 5]
    expect: two entries selected in order "z.rs" then "a.rs"
  - name: unlock_list_merges_owned_and_intersecting_sorted_deduped
    given: owned ["b.rs", "a.rs"], entries [(1..1,"a.rs"), (2..2,"c.rs")], target_rel_to_root "target/rust"
    expect: '["a.rs", "b.rs", "target/rust/a.rs", "target/rust/c.rs"]'
  - name: unlock_list_is_empty_when_no_input
    given: incremental_unlock_list with empty owned files and empty entries, target "target/rust"
    expect: empty list
