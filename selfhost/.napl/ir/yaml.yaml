module: yaml
deps:
  - schemas_line_range
  - schemas_attribution
  - schemas_ir
  - schemas_ml
  - serde_json
types:
  - name: Yaml
    description: "Public value model enum for YAML content, derives Debug/Clone/PartialEq. Variants: Null; Bool(bool); Int(i64); Float(f64); Str(String); Seq(list of Yaml); Map(ordered list of (String key, Yaml value) pairs preserving key insertion order)."
functions:
  - name: to_yaml_document
    signature: "(node: &Yaml) -> String"
    behavior: Renders a whole Yaml node as a block-style document with a single trailing newline. A non-empty map renders as block entries at indent 0; an empty map renders inline as `{}`. A non-empty sequence renders as block items at indent 0; an empty sequence renders inline as `[]`. Any scalar renders as its single scalar line. Body lines are joined by `\n`, then one `\n` is appended.
  - name: line_range
    signature: "(range: LineRange) -> Yaml"
    behavior: Builds a two-element sequence Seq[Int(start), Int(end)] from an inclusive 1-based LineRange, each endpoint rendered as an Int.
  - name: attribution_to_yaml
    signature: "(attribution: &Attribution) -> String"
    behavior: "Renders the attribution document as a Map with keys in order: `module` (string), `target` (string), `entries` (sequence). Each entry is a Map with keys in order: `promptLines` = line_range(prompt_lines), `file` (string), `lines` = line_range(lines), `note` (string). Returns the block-style document with trailing newline."
  - name: ml_to_yaml
    signature: "(ml: &Ml) -> String"
    behavior: "Renders the machine-layer document as a Map with keys `module`, `target`, `entries`. Each entry is a Map with keys in order: `promptLines` = line_range(prompt_lines), `kind` (kind mapped to string: Ambiguity->ambiguity, Assumption->assumption, Note->note, NoOp->no-op), `message`, `reasoning`, and `suggestion` only when suggestion is Some. An empty entries list renders inline as `entries: []`."
  - name: ir_to_yaml
    signature: "(ir: &Ir) -> String"
    behavior: "Renders the IR document as a Map with keys in order: `module` (string), `deps` (sequence of strings), `types` (sequence of Maps with name, description), `functions` (sequence of Maps with name, signature, behavior), `tests` (sequence of Maps with name, given, expect where given and expect are each a serde_json Value converted via json_to_yaml). Empty sequences render inline as `[]`."
  - name: json_to_yaml
    signature: "(value: &serde_json::Value) -> Yaml"
    behavior: "Converts a JSON value to Yaml: null->Null; bool->Bool; a number exactly representable as i64->Int else Float(f64); string->Str; array->Seq of converted items; object->Map of converted entries preserving key order."
  - name: render_string_scalar
    signature: "(s: &str) -> String"
    behavior: "Renders a string scalar. Empty string -> `\"\"`. If plain-representable, verbatim with no quoting. Else if it contains a double-quote and no apostrophe -> single-quoted (apostrophes doubled). Else double-quoted, escaping `\"`->\\\", `\\`->\\\\, newline->\\n, tab->\\t, carriage-return->\\r; other characters pass through. Plain-representable requires: first/last chars not whitespace; no newline or control char (codepoint <0x20 except newline, or 0x7f); first char not one of the indicators , [ ] { } # & * ! | > ' \" % @ `; if first char is - ? or :, a second char exists and is not a space; no \": \", not ending with \":\", no \" #\"; and it does not resolve as a non-string core-schema value (null/bool literals, core integer, or core float)."
tests:
  - name: empty_string_is_double_quoted_empty
    given:
      scalar: ""
    expect: '""'
  - name: plain_strings_stay_plain
    given:
      scalars:
        - yes
        - on
        - Off
        - no
        - it's fine
        - colon:nospace
        - Returns the string Hello, name!
    expect: each renders verbatim, unchanged
  - name: non_plain_strings_are_quoted
    given:
      cases:
        - input: "true"
          output: '"true"'
        - input: "123"
          output: '"123"'
        - input: "null"
          output: '"null"'
        - input: "~"
          output: '"~"'
        - input: "1.5"
          output: '"1.5"'
        - input: "0x10"
          output: '"0x10"'
        - input: ".inf"
          output: '".inf"'
        - input: "greet(name: string): string"
          output: '"greet(name: string): string"'
        - input: "a: b"
          output: '"a: b"'
        - input: "has # hash"
          output: '"has # hash"'
        - input: "- dashlead"
          output: '"- dashlead"'
        - input: "end colon:"
          output: '"end colon:"'
        - input: "#leadinghash"
          output: '"#leadinghash"'
        - input: " leadingspace"
          output: '" leadingspace"'
        - input: "trailingspace "
          output: '"trailingspace "'
        - input: "only ' apostrophe: with colon"
          output: "\"only ' apostrophe: with colon\""
    expect: each input renders to its double-quoted output
  - name: double_quote_without_apostrophe_becomes_single_quoted
    given:
      scalar: '"loudly" is vague'
    expect: "'\"loudly\" is vague'"
  - name: double_quoted_escapes_special_characters
    given:
      cases:
        - input: "a\nb\tc\rd\\e"
          output: '"a\nb\tc\rd\\e"'
        - input: "\"hi\" it's ok"
          output: "\"\\\"hi\\\" it's ok\""
    expect: special characters escaped once double-quoting applies
  - name: non_string_scalars_render_directly
    given:
      cases:
        - value: "Null"
          output: "null"
        - value: Bool(true)
          output: "true"
        - value: Bool(false)
          output: "false"
        - value: Int(-42)
          output: "-42"
        - value: Float(1.5)
          output: "1.5"
    expect: each scalar renders to its direct form
  - name: document_empty_map_and_seq_are_inline
    given:
      cases:
        - node: Map(empty)
          output: "{}\n"
        - node: Seq(empty)
          output: "[]\n"
    expect: empty containers render inline with trailing newline
  - name: document_scalar_root
    given:
      cases:
        - node: Str(hello)
          output: "hello\n"
        - node: Int(7)
          output: "7\n"
    expect: scalar root renders as one line plus trailing newline
  - name: document_flat_map
    given:
      node: Map[(a, Str(x)), (b, Int(3))]
    expect: "a: x\nb: 3\n"
  - name: document_nested_seq_of_maps
    given:
      node: Map[(items, Seq[Map[(k, Int(1))], Map[(k, Int(2))]])]
    expect: "items:\n  - k: 1\n  - k: 2\n"
  - name: document_seq_of_seq
    given:
      node: Seq[Seq[Int(1), Int(2)]]
    expect: "-\n  - 1\n  - 2\n"
  - name: attribution_matches_expected_bytes
    given:
      module: greeting
      target: typescript
      entries:
        - promptLines:
            - 1
            - 1
          file: greet.ts
          lines:
            - 1
            - 1
          note: builds the greeting string
    expect: "module: greeting\ntarget: typescript\nentries:\n  - promptLines:\n      - 1\n      - 1\n    file: greet.ts\n    lines:\n      - 1\n      - 1\n    note: builds the greeting string\n"
  - name: ml_empty_entries_render_inline
    given:
      module: m
      target: t
      entries: []
    expect: "module: m\ntarget: t\nentries: []\n"
  - name: ml_entry_kinds_and_optional_suggestion
    given: an Ml with entries covering each kind and presence/absence of suggestion
    expect: kinds map to ambiguity/assumption/note/no-op, and the suggestion key appears only when suggestion is Some
