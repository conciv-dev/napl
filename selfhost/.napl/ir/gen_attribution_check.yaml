module: gen_attribution_check
deps:
  - schemas_attribution
  - schemas_line_range
types: []
functions:
  - name: assert_attribution_sane
    signature: "(attribution: &Attribution, allowed: &[String]) -> Result<(), String>"
    behavior: "Pure validation of a derived attribution against the set of allowed file paths; performs no I/O. Preconditions: none. Postconditions checked in order, returning on the first violation: (1) if allowed is non-empty and attribution.entries is empty, returns Err with the exact message \"attribution has no entries but the module has attributed source files\"; (2) otherwise, for each entry in attribution.entries in order, if entry.file is not present in allowed, returns Err with the exact message 'attribution entry references file \"<file>\" which is outside the attributed file set' with the offending file substituted and wrapped in straight double quotes; (3) if no rule fires, returns Ok(()). An empty allowed with empty entries yields Ok(()); an entry whose file is in allowed passes.\n"
tests:
  - name: empty_allowed_and_empty_entries_is_ok
    given: attribution with no entries and an empty allowed set
    expect: Ok(())
  - name: nonempty_allowed_and_empty_entries_errors
    given: attribution with no entries and allowed set ["a.ts"]
    expect: 'Err("attribution has no entries but the module has attributed source files")
'
  - name: entry_within_allowed_is_ok
    given: attribution with one entry file "a.ts" and allowed set ["a.ts"]
    expect: Ok(())
  - name: entry_outside_allowed_errors_with_exact_message
    given: attribution with one entry file "b.ts" and allowed set ["a.ts"]
    expect: "Err('attribution entry references file \"b.ts\" which is outside the attributed file set')\n"
  - name: returns_first_violation_in_order
    given: 'attribution with entries ["a.ts", "b.ts", "c.ts"] and allowed set ["a.ts", "c.ts"]
'
    expect: "Err('attribution entry references file \"b.ts\" which is outside the attributed file set') — the first out-of-set entry\n"
  - name: all_entries_within_allowed_multiple_is_ok
    given: 'attribution with entries ["a.ts", "c.ts"] and allowed set ["a.ts", "b.ts", "c.ts"]
'
    expect: Ok(())
