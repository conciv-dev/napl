module: gen_prompt_diff
deps:
  - incremental
types: []
functions:
  - name: compute_prompt_diff
    signature: "compute_prompt_diff(prior_body: Option<Text>, body: Text) -> Text"
    behavior: "Pure derivation of the unified prompt-body diff recorded in a journal entry; no filesystem access and no process spawning. When prior_body is present and the prior body differs from the current body, returns the unified diff text obtained from incremental.diff_body_lines(prior, body).unified. Otherwise — when prior_body is absent, or when the prior body equals the current body — returns the empty string.\n"
tests:
  - name: no_prior_body_returns_empty
    given: prior_body is absent (None) and body is "body"
    expect: returns the empty string ""
  - name: unchanged_body_returns_empty
    given: prior_body is present and equal to body ("body", "body")
    expect: returns the empty string ""
  - name: changed_body_returns_unified_diff
    given: prior_body is present and differs from body ("old line", "new line")
    expect: returns diff_body_lines("old line", "new line").unified, which equals the non-empty unified diff between the two bodies
