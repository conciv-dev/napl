module: gen_prompt_diff
deps:
  - incremental
types: []
functions:
  - name: compute_prompt_diff
    signature: "compute_prompt_diff(prior_body: Option<&str>, body: &str) -> String"
    behavior: "Pure function (no filesystem, no process spawning) that derives the unified prompt diff recorded in a journal entry. Postcondition: when prior_body is Some(prior) and prior differs from body, returns diff_body_lines(prior, body).unified (the unified field of the sibling incremental module's body-line diff between prior and current bodies). Otherwise — when prior_body is None, or the prior body equals the current body — returns the empty string. Does not reimplement diffing; delegates to incremental::diff_body_lines.\n"
tests:
  - name: no_prior_body_returns_empty
    given: prior_body is None and body is "body"
    expect: returns empty string ""
  - name: unchanged_body_returns_empty
    given: prior_body is Some("body") equal to body "body"
    expect: returns empty string ""
  - name: changed_body_returns_unified_diff
    given: prior_body is Some("old line") and body is "new line"
    expect: returns diff_body_lines("old line", "new line").unified, which is non-empty
