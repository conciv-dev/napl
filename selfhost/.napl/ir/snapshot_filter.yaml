module: snapshot_filter
deps: []
types:
  - name: SnapshotFilter
    description: "Pure exclusion-predicate value holding four rule collections: excluded directory names, excluded file names, excluded root-only file names, and excluded file-name suffixes. Holds no filesystem state and performs no I/O; only answers exclusion questions about names."
functions:
  - name: make_filter
    signature: "make_filter(exclude_dirs: list[string], exclude_files: list[string], exclude_root_files: list[string], exclude_suffixes: list[string]) -> SnapshotFilter"
    behavior: Constructs a SnapshotFilter by copying the four given rule lists into it, in the exact parameter order (directory names, file names, root-only file names, suffixes). Performs no I/O. Empty lists are permitted and yield a filter that excludes nothing.
  - name: SnapshotFilter.is_excluded_dir
    signature: "is_excluded_dir(self: SnapshotFilter, name: string) -> bool"
    behavior: Returns true when name exactly matches one of the excluded directory names, false otherwise. Only exact whole-name matches count; there is no prefix or suffix logic for directories.
  - name: SnapshotFilter.is_excluded_file
    signature: "is_excluded_file(self: SnapshotFilter, name: string, at_root: bool) -> bool"
    behavior: "Returns true when any of these hold, false only when none do: name exactly matches an excluded file name; or at_root is true and name exactly matches an excluded root-only file name; or name ends with one of the excluded suffixes. When at_root is false the root-only list is ignored entirely; the plain file-name and suffix rules apply regardless of at_root."
tests:
  - name: dir_exact_match_excluded
    given: Filter with exclude_dirs ["node_modules", ".git"]; query is_excluded_dir("node_modules") and is_excluded_dir(".git").
    expect: Both return true.
  - name: dir_non_match_not_excluded
    given: Same filter; query is_excluded_dir("src").
    expect: Returns false.
  - name: dir_no_suffix_or_prefix_logic
    given: Same filter; query is_excluded_dir("node_modules_extra") and is_excluded_dir("my_node_modules").
    expect: Both return false, since only exact whole-name matches count.
  - name: plain_file_rule_excluded_regardless_of_depth
    given: Filter with exclude_files ["AGENTS.md"]; query is_excluded_file("AGENTS.md", false) and is_excluded_file("AGENTS.md", true).
    expect: Both return true; plain file rule applies regardless of at_root.
  - name: suffix_rule_excluded_anywhere
    given: Filter with exclude_suffixes [".d.ts"]; query is_excluded_file("types.d.ts", false) and is_excluded_file("types.d.ts", true).
    expect: Both return true via the suffix rule, regardless of at_root.
  - name: root_only_rule_applies_at_root
    given: Filter with exclude_root_files ["Cargo.toml"]; query is_excluded_file("Cargo.toml", true).
    expect: Returns true, since the root-only rule matches at the root.
  - name: root_only_rule_ignored_below_root
    given: Same filter; query is_excluded_file("Cargo.toml", false).
    expect: Returns false, since the root-only rule does not apply below the root and no plain or suffix rule matches.
  - name: no_matching_rule_not_excluded
    given: The worked filter; query is_excluded_file("keep.ts", false) and is_excluded_file("keep.ts", true).
    expect: Both return false, since no rule matches.
  - name: empty_rules_exclude_nothing
    given: Filter built from four empty lists; query is_excluded_dir("anything"), is_excluded_file("anything", true), and is_excluded_file("anything", false).
    expect: All return false.
