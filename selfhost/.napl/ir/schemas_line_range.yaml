module: schemas_line_range
deps: []
types:
  - name: LineRange
    description: "Value type for inclusive 1-based line range. Fields: start (u32), end (u32). Constructible via new(start, end). Supports equality comparison and clone/copy semantics (two ranges equal iff same start and end). Implements deserialization from JSON via a custom lenient Deserialize."
functions:
  - name: LineRange::new
    signature: "new(start: u32, end: u32) -> LineRange"
    behavior: Constructs a LineRange with given start and end. No validation performed (validation only applies to the deserializer path).
  - name: LineRange::deserialize
    signature: "deserialize<D: Deserializer>(deserializer: D) -> Result<LineRange, D::Error>"
    behavior: "Lenient deserializer accepting three JSON shapes and normalizing to a LineRange: (1) a bare number n -> range n..=n; (2) a one-element array [n] -> range n..=n; (3) a two-element array [a, b] -> range with start=a, end=b. Every numeric line value must be an integer at least 1: value 0 is rejected (bare or in array); a number with nonzero fractional part is rejected (bare or in array); a number with zero fractional part (e.g. 2.0) is accepted and treated as its integer value. Arrays with 0, or 3+ elements are rejected. Any other JSON type (string, boolean, object) is rejected. On any rejection, returns an Err rather than panicking; exact error message is unspecified."
tests:
  - name: new_constructor_and_equality
    given: LineRange::new(1, 3) compared to another LineRange::new(1, 3), and a copy of the first
    expect: Both are equal to each other; start == 1 and end == 3; copy equals original
  - name: bare_number_becomes_single_line_range
    given: JSON input "5"
    expect: Deserializes to LineRange::new(5, 5)
  - name: one_element_array_becomes_single_line_range
    given: JSON input "[5]"
    expect: Deserializes to LineRange::new(5, 5)
  - name: two_element_array_becomes_range
    given: JSON input "[2, 7]"
    expect: Deserializes to LineRange::new(2, 7)
  - name: bare_zero_is_rejected
    given: JSON input "0"
    expect: Deserialization returns an error
  - name: zero_in_array_is_rejected
    given: JSON input "[0, 2]"
    expect: Deserialization returns an error
  - name: fractional_bare_number_is_rejected
    given: JSON input "1.5"
    expect: Deserialization returns an error
  - name: fractional_number_in_array_is_rejected
    given: JSON input "[1.5, 2]"
    expect: Deserialization returns an error
  - name: whole_valued_float_is_accepted
    given: JSON input "2.0"
    expect: Deserializes to LineRange::new(2, 2)
  - name: three_element_array_is_rejected
    given: JSON input "[1, 2, 3]"
    expect: Deserialization returns an error
  - name: empty_array_is_rejected
    given: JSON input "[]"
    expect: Deserialization returns an error
  - name: string_is_rejected
    given: JSON input "\"nope\""
    expect: Deserialization returns an error
  - name: boolean_is_rejected
    given: JSON input "true"
    expect: Deserialization returns an error
  - name: object_is_rejected
    given: 'JSON input "{\"start\": 1, \"end\": 2}"'
    expect: Deserialization returns an error
  - name: negative_number_is_rejected
    given: JSON input "-1"
    expect: Deserialization returns an error
