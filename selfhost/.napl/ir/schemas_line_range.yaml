module: schemas_line_range
deps:
  - serde
  - serde_json
types:
  - name: LineRange
    description: A value type for a 1-based inclusive line range with two public unsigned 32-bit integer fields, "start" and "end". Supports equality comparison and copy/clone so two ranges with the same endpoints compare equal.
functions:
  - name: new
    signature: "new(start: u32, end: u32) -> LineRange"
    behavior: Constructs a LineRange with the given start and end endpoints, stored verbatim. No validation is performed by the constructor itself.
  - name: deserialize
    signature: "deserialize(input: Deserializer) -> Result<LineRange, Error>"
    behavior: 'Lenient deserializer accepting three JSON shapes and normalizing to start/end. A bare number "n" yields the range n..=n. A one-element array "[n]" yields n..=n. A two-element array "[a, b]" yields start a and end b. Every line number must be an integer of at least 1: the value 0 is rejected (bare or in-array), a number with a nonzero fractional part is rejected (bare or in-array), and a number whose fractional part is zero is accepted as that integer (so 2.0 becomes 2..=2). Arrays with zero or three-or-more elements are rejected. Values of any other type (string, boolean, object) and negative numbers are rejected. Rejection returns an error, never a panic.'
tests:
  - name: new_constructor_and_equality
    given: Two LineRange values built via new(1, 3), plus a copy of one.
    expect: They compare equal; start is 1 and end is 3; the copy equals the original.
  - name: bare_number_becomes_single_line_range
    given: The JSON "5".
    expect: Deserializes to LineRange::new(5, 5).
  - name: one_element_array_becomes_single_line_range
    given: The JSON "[5]".
    expect: Deserializes to LineRange::new(5, 5).
  - name: two_element_array_becomes_range
    given: The JSON "[2, 7]".
    expect: Deserializes to LineRange::new(2, 7).
  - name: bare_zero_is_rejected
    given: The JSON "0".
    expect: Deserialization returns an error.
  - name: zero_in_array_is_rejected
    given: The JSON "[0, 2]".
    expect: Deserialization returns an error.
  - name: fractional_bare_number_is_rejected
    given: The JSON "1.5".
    expect: Deserialization returns an error.
  - name: fractional_number_in_array_is_rejected
    given: The JSON "[1.5, 2]".
    expect: Deserialization returns an error.
  - name: whole_valued_float_is_accepted
    given: The JSON "2.0".
    expect: Deserializes to LineRange::new(2, 2).
  - name: three_element_array_is_rejected
    given: The JSON "[1, 2, 3]".
    expect: Deserialization returns an error.
  - name: empty_array_is_rejected
    given: The JSON "[]".
    expect: Deserialization returns an error.
  - name: string_is_rejected
    given: The JSON string "nope".
    expect: Deserialization returns an error.
  - name: boolean_is_rejected
    given: The JSON "true".
    expect: Deserialization returns an error.
  - name: object_is_rejected
    given: The JSON object with keys "start" and "end".
    expect: Deserialization returns an error.
  - name: negative_number_is_rejected
    given: The JSON "-1".
    expect: Deserialization returns an error.
