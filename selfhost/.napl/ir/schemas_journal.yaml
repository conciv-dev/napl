module: schemas_journal
deps:
  - text_diff
  - blame
types:
  - name: JournalFile
    description: 'One file touched by a generation. Fields: path (string), patch (string, unified diff text), hash_before (optional string, serialized as "hashBefore"), hash_after (string, serialized as "hashAfter"). Equality and Debug/Clone derivable; serializable/deserializable.
'
  - name: JournalMode
    description: "Enum of generation modes: Full, Incremental, Reconcile, Move. Serialized as lowercase strings \"full\", \"incremental\", \"reconcile\", \"move\". Move records a location-heal: a generated file relocated to a new path when its content was unchanged/drifted under a different filename; the file entry's patch describes the move. Copyable, equatable.\n"
  - name: JournalEntry
    description: 'One generation record. Fields: gen (integer), timestamp (string), module (string), target (string), prompt_hash (string, serialized as "promptHash"), prompt_diff (string, serialized as "promptDiff"), mode (JournalMode), files (list of JournalFile, defaults to empty list when omitted from JSON). Equatable, cloneable, serializable/deserializable.
'
functions:
  - name: file_patch
    signature: "file_patch(before: Optional<string>, after: string) -> string"
    behavior: "Returns the unified diff between `before` (or empty string when `before` is absent, representing a newly created file) and `after`. Delegates entirely to the text_diff module's unified-diff computation; performs no independent diffing logic.\n"
  - name: read_journal_str
    signature: "read_journal_str(raw: string) -> (entries: List<JournalEntry>, warnings: List<string>)"
    behavior: "Parses raw JSONL journal text line by line (split on '\\n', trailing '\\r' stripped, 1-based line numbering). Blank lines (empty after trim) are skipped silently — no entry, no warning. For each non-blank line: first checks whether the line is syntactically valid JSON (any JSON value). If not, emits warning exactly `journal: skipping corrupt line {n} (invalid JSON)` and skips the line — no entry produced, and no deserialization error message is surfaced in this case. If it is valid JSON, attempts to deserialize it as a JournalEntry and validate it. Validation fails when gen < 1, module is empty, target is empty, or any file's path is empty. If deserialization or validation fails, emits warning `journal: skipping corrupt line {n} ({reason})` where reason is the deserialize error message or a validation-failure reason, and no entry is produced. On success the entry is appended to the returned entries list, in line order. Returns the full list of accepted entries plus one warning per skipped/corrupt line, in encounter order.\n"
  - name: next_gen_number
    signature: "next_gen_number(entries: List<JournalEntry>) -> integer"
    behavior: "Returns one more than the maximum `gen` value found among `entries`. Returns 1 when `entries` is empty.\n"
  - name: file_history
    signature: "file_history(entries: List<JournalEntry>, file_path: string) -> List<BlameSourceEntry>"
    behavior: "Walks `entries` in order; for each entry containing a file whose `path` equals `file_path`, produces a BlameSourceEntry with that entry's gen, timestamp, module, the matching file's patch, and the entry's prompt_diff. Entries with no matching file are omitted. Returns an empty list when no entry touches `file_path`. When an entry has multiple files matching, uses the first match.\n"
tests:
  - name: file_patch_treats_none_as_empty_before
    given: before=None, after='line one\n'; and before=Some('old\n'), after='new\n'
    expect: result equals text_diff::unified_diff called with '' (or 'old\n') and the given after text
  - name: read_journal_str_skips_blank_lines_silently
    given: raw = '\n\n   \n'
    expect: entries empty, warnings empty
  - name: read_journal_str_warns_on_invalid_json
    given: raw = 'not json at all'
    expect: "entries empty; warnings = ['journal: skipping corrupt line 1 (invalid JSON)']"
  - name: read_journal_str_warns_on_failed_validation
    given: a syntactically valid JSON line with gen=0 (otherwise well-formed entry)
    expect: "entries empty; one warning starting with 'journal: skipping corrupt line 1 ('"
  - name: read_journal_str_rejects_empty_module_target_or_file_path
    given: three JSON lines, each with exactly one of module/target/file path empty
    expect: each yields entries empty and exactly one warning
  - name: read_journal_str_accepts_valid_entries_and_strips_cr
    given: a valid serialized entry line followed by '\r\n\r\n'
    expect: entries has 1 item with gen 1; warnings empty
  - name: read_journal_str_line_numbers_are_one_based_and_mixed
    given: valid entry line, then 'not json', then valid entry line again
    expect: "entries has 2 items; warnings = ['journal: skipping corrupt line 2 (invalid JSON)']"
  - name: next_gen_number_empty_is_one
    given: empty entries list
    expect: returns 1
  - name: next_gen_number_is_one_past_max
    given: entries with gen values 1, 3, 2
    expect: returns 4
  - name: file_history_collects_matching_files_in_order
    given: three entries (gen 1,2,3); entries 1 and 3 touch 'hash/src/lib.rs' with distinct patches, entry 2 touches a different path
    expect: "history has 2 items, in order: gen 1 with its patch, then gen 3 with its patch"
  - name: file_history_empty_when_no_entry_touches_file
    given: one entry that does not reference the queried file path
    expect: returns empty list
  - name: journal_file_serde_field_names
    given: a JournalFile with hash_before=Some('h1'), hash_after='h2'
    expect: serialized JSON has keys hashBefore='h1', hashAfter='h2'; round-trip deserialization equals original
  - name: journal_mode_serializes_lowercase
    given: each JournalMode variant
    expect: serializes to '"full"', '"incremental"', '"reconcile"', '"move"' respectively
  - name: journal_entry_field_names_and_default_files
    given: JSON object with promptHash, promptDiff, mode='incremental', and no 'files' key
    expect: deserializes with prompt_hash/prompt_diff mapped correctly, mode=Incremental, files defaults to empty list
