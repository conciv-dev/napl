module: schemas_journal
deps:
  - text_diff
  - blame
types:
  - name: JournalFile
    description: 'One file touched by a generation. Fields: path (string), patch (string, the unified diff), hash_before (optional string, serialized as "hashBefore"), hash_after (string, serialized as "hashAfter"). Debug, Clone, PartialEq, Eq, Serialize, Deserialize.'
  - name: JournalMode
    description: "Enumeration of the mode a generation ran in, with variants Full, Incremental, Reconcile, and Move, serialized in lowercase as \"full\", \"incremental\", \"reconcile\", \"move\". Move records a location-heal: a generated file relocated to a new path when its content was unchanged or drifted under a different filename, with the file entry's patch describing the move. Copy, Debug, Clone, PartialEq, Eq, Serialize, Deserialize."
  - name: JournalEntry
    description: 'One generation of a module against a target. Fields: gen (integer), timestamp (string), module (string), target (string), prompt_hash (string, serialized as "promptHash"), prompt_diff (string, serialized as "promptDiff"), mode (JournalMode), files (list of JournalFile, defaulting to empty when omitted from JSON). Debug, Clone, PartialEq, Eq, Serialize, Deserialize.'
functions:
  - name: file_patch
    signature: "file_patch(before: optional string, after: string) -> string"
    behavior: Returns the unified diff for a created file (before absent, treated as empty string) or a modified file. Delegates to text_diff::unified_diff, passing an empty string when before is absent.
  - name: read_journal_str
    signature: "read_journal_str(raw: string) -> (list of JournalEntry, list of string)"
    behavior: 'Parses raw JSONL text and returns valid entries plus one warning string per skipped line. Lines are split on newline with a trailing carriage return stripped, tracking a 1-based line number. A line empty after trimming is skipped silently. A line that is not syntactically valid JSON yields the byte-exact warning "journal: skipping corrupt line {n} (invalid JSON)". A line that is valid JSON but fails to deserialize as a JournalEntry or fails validation yields the warning "journal: skipping corrupt line {n} ({reason})" sharing the same prefix. Validation rejects an entry when gen is less than 1, module is empty, target is empty, or any file path is empty; a rejected entry is skipped with a warning and never appears in the results. Valid entries are collected in order.'
  - name: next_gen_number
    signature: "next_gen_number(entries: list of JournalEntry) -> integer"
    behavior: Returns one past the highest gen among the entries, or 1 for an empty slice.
  - name: file_history
    signature: "file_history(entries: list of JournalEntry, file_path: string) -> list of BlameSourceEntry"
    behavior: In entry order, for each entry containing a file whose path equals file_path, emits a BlameSourceEntry carrying that entry's gen, timestamp, module, the matching file's patch, and the entry's prompt_diff. Entries that do not touch the file are omitted, so the result is empty when no entry touches file_path.
tests:
  - name: journal_file_serde_field_names
    given: A JournalFile with hash_before Some("h1") and hash_after "h2" serialized to a JSON value.
    expect: JSON key "hashBefore" equals "h1" and "hashAfter" equals "h2"; deserializing back round-trips to the original value.
  - name: journal_mode_serializes_lowercase
    given: Each JournalMode variant serialized to a JSON string.
    expect: Full is "full", Incremental is "incremental", Reconcile is "reconcile", Move is "move".
  - name: journal_entry_field_names_and_default_files
    given: A JSON object with promptHash, promptDiff, mode "incremental" and no files key deserialized as a JournalEntry.
    expect: prompt_hash is "ph", prompt_diff is "pd", mode is Incremental, and files is empty.
  - name: file_patch_treats_none_as_empty_before
    given: file_patch called with an absent before for a created file, and with a present before for a modified file.
    expect: The created result equals unified_diff("", after) and the modified result equals unified_diff(before, after).
  - name: read_journal_str_skips_blank_lines_silently
    given: Raw text consisting only of blank and whitespace-only lines.
    expect: No entries and no warnings are returned.
  - name: read_journal_str_warns_on_invalid_json
    given: Raw text "not json at all".
    expect: 'No entries and a single warning equal to "journal: skipping corrupt line 1 (invalid JSON)".'
  - name: read_journal_str_warns_on_failed_validation
    given: A syntactically valid JSON entry with gen 0 and empty files.
    expect: 'No entries and a single warning starting with "journal: skipping corrupt line 1 (".'
  - name: read_journal_str_rejects_empty_module_target_or_file_path
    given: Entries each with respectively an empty module, empty target, or empty file path.
    expect: Each case returns no entries and exactly one warning.
  - name: read_journal_str_accepts_valid_entries_and_strips_cr
    given: A valid entry line followed by carriage-return-newline blank lines.
    expect: One entry returned with gen 1 and no warnings.
  - name: read_journal_str_line_numbers_are_one_based_and_mixed
    given: A valid entry, then a non-JSON line, then a valid entry.
    expect: 'Two entries returned and one warning equal to "journal: skipping corrupt line 2 (invalid JSON)".'
  - name: next_gen_number_empty_is_one
    given: An empty slice of entries.
    expect: Returns 1.
  - name: next_gen_number_is_one_past_max
    given: Entries with gen values 1, 3, and 2.
    expect: Returns 4.
  - name: file_history_collects_matching_files_in_order
    given: Three entries where the first and third touch "hash/src/lib.rs" with patches "patch-one" and "patch-three" and the second touches a different path.
    expect: History has length 2 with gen 1 patch "patch-one" first and gen 3 patch "patch-three" second.
  - name: file_history_empty_when_no_entry_touches_file
    given: Entries none of which touch "nonexistent.rs".
    expect: The result is empty.
