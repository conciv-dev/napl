module: schemas_ordered_map
deps: []
types:
  - name: OrderedMap<V>
    description: "Generic map from owned String keys to values of type V, preserving first-insertion order for all iteration (whole map, keys, values). Default is empty. Supports equality comparison (two maps equal iff same entries in same order). Serializes as a plain map/object with entries in insertion order; deserializes from a map, preserving the order entries appear in the input.\n"
functions:
  - name: new
    signature: OrderedMap::new() -> OrderedMap<V>
    behavior: Returns an empty map, identical to Default::default().
  - name: default
    signature: OrderedMap::default() -> OrderedMap<V>
    behavior: Returns an empty map with no entries.
  - name: len
    signature: len(&self) -> usize
    behavior: Returns number of entries currently in the map.
  - name: is_empty
    signature: is_empty(&self) -> bool
    behavior: Returns true iff len() == 0.
  - name: contains_key
    signature: "contains_key(&self, key: &str) -> bool"
    behavior: Returns true iff a key equal to `key` is present.
  - name: get
    signature: "get(&self, key: &str) -> Option<&V>"
    behavior: Returns shared reference to value for key if present, else None.
  - name: get_mut
    signature: "get_mut(&mut self, key: &str) -> Option<&mut V>"
    behavior: Returns mutable reference to value for key if present, else None.
  - name: insert
    signature: "insert(&mut self, key: String, value: V) -> ()"
    behavior: "If key already present, replaces its value in place, leaving key's position in iteration order unchanged. Otherwise appends key as new last entry. No return value.\n"
  - name: remove
    signature: "remove(&mut self, key: &str) -> Option<V>"
    behavior: "If key present, removes it and returns its value, shifting later entries to close the gap so remaining keys keep relative order. If key absent, returns None and map unchanged.\n"
  - name: iter
    signature: iter(&self) -> Iterator<Item = (&String, &V)>
    behavior: Yields (key, value) pairs in first-insertion order.
  - name: keys
    signature: keys(&self) -> Iterator<Item = &String>
    behavior: Yields keys in first-insertion order.
  - name: values
    signature: values(&self) -> Iterator<Item = &V>
    behavior: Yields values in first-insertion order.
  - name: serialize
    signature: "Serialize for OrderedMap<V> where V: Serialize"
    behavior: "Serializes as a map/object type, emitting entries in insertion order.\n"
  - name: deserialize
    signature: "Deserialize for OrderedMap<V> where V: Deserialize"
    behavior: "Deserializes from a map input, building an OrderedMap by inserting entries in the order they appear in the input, preserving that order.\n"
tests:
  - name: default_and_new_are_empty
    given: OrderedMap::default() and OrderedMap::new() with no insertions
    expect: both empty (len 0, is_empty true) and equal to each other
  - name: preserves_first_insertion_order
    given: insert z, then a, then m
    expect: keys() yields [z, a, m], not sorted order
  - name: reinsert_replaces_in_place_without_moving
    given: insert a=1, b=2, then a=9
    expect: get("a") is 9, keys() still [a, b] (a not moved to end)
  - name: remove_closes_gap_and_returns_value
    given: insert a=1, b=2, then remove a
    expect: remove returns Some(1), contains_key("a") false, keys() is [b]
  - name: remove_missing_key_returns_none
    given: map with only a=1, remove "nope"
    expect: returns None
  - name: get_mut_updates_value
    given: insert a=1, mutate via get_mut to 42
    expect: get("a") is Some(42)
  - name: iter_and_values_follow_insertion_order
    given: insert z=1, a=2
    expect: iter() yields [(z,1),(a,2)]; values() yields [1,2]
  - name: serializes_in_insertion_order
    given: insert z=1, a=2, serialize to JSON
    expect: JSON string is exactly {"z":1,"a":2}
  - name: round_trips_through_json_preserving_order
    given: map with z=1, a=2 serialized to JSON then deserialized
    expect: decoded map equals original; keys() is [z, a]
