module: paths_core
deps: []
types:
  - name: NaplPaths
    description: "Resolved `.napl` project layout. Struct of ten public path fields, each a filesystem path value: ir_dir, src_dir, map_path, lock_path, gen_lock_path, journal_path, prompts_at_gen_dir, examples_dir, attribution_dir, ml_dir. Holds computed locations only; carries no behavior and touches no filesystem."
functions:
  - name: resolve_paths
    signature: "resolve_paths(root: Path) -> NaplPaths"
    behavior: 'Pure. Given a project root, computes the `.napl` layout with no filesystem access. Let napl_dir = root joined with ".napl". Returns a NaplPaths where ir_dir = napl_dir/"ir", src_dir = napl_dir/"src", map_path = napl_dir/"map.json", lock_path = napl_dir/"lock.json", gen_lock_path = napl_dir/"gen.lock", journal_path = napl_dir/"journal.jsonl", prompts_at_gen_dir = napl_dir/"prompts-at-gen", attribution_dir = napl_dir/"attribution", and ml_dir = napl_dir/"mapl". Exception: examples_dir = root/"examples" — placed beside `.napl`, not inside it.'
  - name: rel_to
    signature: "rel_to(root: Path, path: Path) -> String"
    behavior: Pure. Renders `path` relative to `root` as a POSIX-style string. Strips the `root` prefix from `path`; if `path` is not under `root`, uses `path` unchanged. The result is rendered with the platform path separator replaced by forward slash "/", so output is always POSIX-style regardless of platform. Normal segments preserved, "." segments dropped, ".." preserved, a leading root separator yields a leading "/".
tests:
  - name: resolve_paths_places_fields_under_napl_dir
    given: root = /p
    expect: ir_dir = /p/.napl/ir, src_dir = /p/.napl/src, map_path = /p/.napl/map.json, lock_path = /p/.napl/lock.json, gen_lock_path = /p/.napl/gen.lock, journal_path = /p/.napl/journal.jsonl, prompts_at_gen_dir = /p/.napl/prompts-at-gen, attribution_dir = /p/.napl/attribution.
  - name: examples_dir_sits_beside_napl_not_inside_it
    given: root = /p
    expect: examples_dir = /p/examples (not under .napl)
  - name: ml_dir_is_named_mapl
    given: root = /p
    expect: ml_dir = /p/.napl/mapl
  - name: rel_to_strips_root_prefix
    given: root = /project, path = /project/.napl/map.json
    expect: returns ".napl/map.json"
  - name: rel_to_returns_path_unchanged_when_not_under_root
    given: root = /project, path = /other/file.txt
    expect: returns "/other/file.txt"
  - name: rel_to_renders_forward_slashes
    given: root = /root, path = /root/a/b/c/d.txt
    expect: returns "a/b/c/d.txt" with no backslashes
