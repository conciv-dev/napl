module: schemas_attribution
deps:
  - schemas_line_range
types:
  - name: AttributionEntry
    description: 'One prompt-line-to-file-line mapping. Deserializable, cloneable, and equality-comparable. Fields: prompt_lines (a LineRange from schemas_line_range, JSON key "promptLines" in camelCase), file (string), lines (a LineRange), and note (string that defaults to the empty string when the JSON key is absent). Line-range fields accept the lenient spellings of LineRange (bare number, one-element array, or two-element array).
'
  - name: Attribution
    description: "A whole attribution document. Deserializable, cloneable, and equality-comparable. Fields: module (string), target (string), and entries (list of AttributionEntry that defaults to empty when the JSON key is absent).\n"
  - name: AttributionError
    description: "The rejection value returned (never panicked) by validation. Variants: Parse (carries a message describing a structural deserialization failure), EmptyModule, EmptyTarget, and EmptyFile. Comparable and displayable as a human-readable error message.\n"
functions:
  - name: validate_attribution
    signature: "validate_attribution(value: JsonValue) -> Result<Attribution, AttributionError>"
    behavior: "Deserializes the JSON value into an Attribution, then validates it. A structurally malformed value (e.g. a line range that is not an integer such as 1.5, or an entry missing its file key) yields a Parse error. After successful parsing: returns EmptyModule if module is empty, EmptyTarget if target is empty, and EmptyFile if any entry's file is empty. On success returns the parsed Attribution with normalized line ranges and defaulted note/entries. Rejection is an error value, not a panic.\n"
  - name: parse_attribution_entries
    signature: "parse_attribution_entries(value: JsonValue) -> Result<Vec<AttributionEntry>, AttributionError>"
    behavior: "If the value is not a JSON array, returns an empty list with no error. Otherwise deserializes the value as a list of AttributionEntry (a malformed member, such as one whose promptLines is a string, yields a Parse error), then returns EmptyFile if any entry's file is empty. On success returns the list of validated entries.\n"
  - name: entries_at_body_line
    signature: "entries_at_body_line(attribution: &Attribution, body_line: u32) -> Vec<&AttributionEntry>"
    behavior: "Returns references to every entry whose promptLines range contains body_line, inclusive on both ends (start <= body_line <= end), preserving document order. Returns an empty list when no entry's range contains the line.\n"
tests:
  - name: validates_a_well_formed_document
    given: 'A document with module "m", target "rust", and three entries.
'
    expect: 'validate_attribution succeeds; module is "m", target is "rust", and there are 3 entries.
'
  - name: entry_field_normalization
    given: "An entry with promptLines [8], lines 3, and no note.\n"
    expect: "prompt_lines normalizes to 8..=8, lines to 3..=3, and note is the empty string.\n"
  - name: entries_default_to_empty_when_absent
    given: "A document with module and target but no entries key.\n"
    expect: "Parsing succeeds and entries is empty.\n"
  - name: rejects_empty_module
    given: 'A document with module "" and target "rust".
'
    expect: "validate_attribution returns the EmptyModule error.\n"
  - name: rejects_empty_target
    given: 'A document with module "m" and target "".
'
    expect: "validate_attribution returns the EmptyTarget error.\n"
  - name: rejects_entry_with_empty_file
    given: 'A document whose single entry has file "".
'
    expect: "validate_attribution returns the EmptyFile error.\n"
  - name: rejects_entry_missing_file
    given: "A document whose single entry omits the file key.\n"
    expect: "validate_attribution returns a Parse error.\n"
  - name: rejects_malformed_line_range
    given: "A document whose entry has promptLines 1.5 (a non-integer).\n"
    expect: "validate_attribution returns a Parse error.\n"
  - name: parse_entries_returns_empty_for_non_array
    given: "A JSON value that is an object, not an array.\n"
    expect: "parse_attribution_entries returns an empty list with no error.\n"
  - name: parse_entries_parses_a_valid_list
    given: 'A JSON array with one valid entry whose file is "a.rs".
'
    expect: 'parse_attribution_entries returns one entry whose file is "a.rs".
'
  - name: parse_entries_rejects_entry_with_empty_file
    given: 'A JSON array with one entry whose file is "".
'
    expect: "parse_attribution_entries returns the EmptyFile error.\n"
  - name: parse_entries_errors_on_malformed_list
    given: 'A JSON array with one entry whose promptLines is the string "nope".
'
    expect: "parse_attribution_entries returns a Parse error.\n"
  - name: entries_at_body_line_finds_all_containing_entries
    given: 'A document with entries promptLines [2,2] ("builds the greeting"), [3,4] ("trims whitespace"), and [3,3] ("covers trimming").
'
    expect: Body line 3 yields the two entries "trims whitespace" and "covers trimming" in document order; body line 2 yields only "builds the greeting"; body line 9 yields none.
