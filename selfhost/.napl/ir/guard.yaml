module: guard
deps: []
types:
  - name: SettingsMergeAction
    description: 'Enumeration of merge outcomes with four variants: "Create" (no file existed, one should be created), "Update" (existing file gained the deny rule), "Unchanged" (file already denied the rule), and "Manual" (file could not be safely merged). Supports equality and copy.'
  - name: SettingsMergeResult
    description: 'Record describing the result of a settings merge. Public fields: "action" (a SettingsMergeAction), "content" (an optional string holding the new file content to write when applicable, absent otherwise), and "added" (a list of strings naming the rules that were added). Supports equality.'
functions:
  - name: claude_settings_snippet
    signature: () -> String
    behavior: 'Returns the fresh-install ".claude/settings.json" content: a JSON object mapping "permissions" to an object mapping "deny" to a one-element list containing "Edit(/.napl/src/**)", pretty-printed with two-space indentation and terminated by a trailing newline. Postcondition: the result equals the pinned snippet string exactly.'
  - name: merge_claude_settings
    signature: "(existing: Optional<String>) -> SettingsMergeResult"
    behavior: "Pure merge of the NAPL deny rules into an existing Claude settings document. If existing is absent, returns action \"Create\" with content set to the settings snippet and added set to the full deny-rule list. Otherwise parses existing as JSON: if parsing fails or the root is not a JSON object, returns action \"Manual\" with no content and empty added. Reads the root \"permissions\" value — absent is treated as an empty object, an object is used as-is, any other type yields \"Manual\". Reads that object's \"deny\" value — absent is treated as an empty array, an array is used as-is, any other type yields \"Manual\". Appends each NAPL deny rule not already present in the deny array, recording it as added. If nothing was added, returns action \"Unchanged\" with no content and empty added. Otherwise reassembles the deny array into permissions and permissions into root, pretty-prints with two-space indentation and a trailing newline, and returns action \"Update\" with that content and the added rules. Postcondition: unrelated top-level keys and existing permission entries such as an \"allow\" list are preserved in the output."
tests:
  - name: guard_doc_is_pinned
    given: The GUARD_DOC constant.
    expect: Equals the exact generated-tree doc string ending with a trailing newline.
  - name: guard_file_names_are_pinned
    given: The GUARD_FILE_NAMES constant.
    expect: Equals the two names "AGENTS.md" and "CLAUDE.md" in that order.
  - name: pre_commit_hook_is_pinned
    given: The PRE_COMMIT_HOOK constant.
    expect: Equals the exact POSIX sh pre-commit hook string with tab-indented lines and a trailing newline.
  - name: pre_commit_hook_line_is_pinned
    given: The PRE_COMMIT_HOOK_LINE constant.
    expect: Equals "napl status".
  - name: napl_deny_rules_are_pinned
    given: The NAPL_DENY_RULES constant.
    expect: Equals a one-element list containing "Edit(/.napl/src/**)".
  - name: snippet_matches_pinned_string
    given: A call to claude_settings_snippet().
    expect: Returns the pinned snippet string with two-space indentation and a trailing newline.
  - name: merge_with_no_existing_content_creates
    given: merge_claude_settings called with no existing content.
    expect: Action is "Create", content is the snippet, and added is ["Edit(/.napl/src/**)"].
  - name: merge_with_snippet_already_present_is_unchanged
    given: merge_claude_settings called with the snippet as existing content.
    expect: Action is "Unchanged", content is absent, and added is empty.
  - name: merge_preserves_unrelated_keys_and_allow_list
    given: 'Existing content { "other": true, "permissions": { "allow": ["Read"] } }.'
    expect: 'Action is "Update"; content still contains "other": true, still contains "allow", now contains "Edit(/.napl/src/**)", and ends with a closing brace then a newline; added is ["Edit(/.napl/src/**)"].'
  - name: merge_invalid_json_is_manual
    given: Existing content "not json".
    expect: Action is "Manual", content is absent, and added is empty.
  - name: merge_non_object_root_is_manual
    given: Existing content "[1,2,3]".
    expect: Action is "Manual".
  - name: merge_non_object_permissions_is_manual
    given: 'Existing content {"permissions": 5}.'
    expect: Action is "Manual".
  - name: merge_non_array_deny_is_manual
    given: 'Existing content {"permissions": {"deny": 5}}.'
    expect: Action is "Manual".
  - name: merge_missing_permissions_treats_as_empty_object
    given: 'Existing content {"foo": "bar"} with no permissions key.'
    expect: 'Action is "Update"; content contains "Edit(/.napl/src/**)" and still contains "foo": "bar".'
