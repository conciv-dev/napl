module: statusclass_render
deps: []
types:
  - name: FileStatus
    description: 'Enumeration classifying a prompt relative to its generated files. Value semantics (copyable, equatable). Exactly four variants, each with a fixed render label: Clean (locked, attributed, prompt matches last gen; label "clean"), PromptStale (not generated, or prompt changed since gen; label "prompt-stale"), Drift (a generated file was edited or deleted; label "DRIFT", uppercased as an error state), Unattributed (generated files exist but attribution failed; label "unattributed").'
  - name: StatusEntry
    description: "A classified prompt ready to render as one status line. Fields: file (the prompt path relative to the project root), status (a FileStatus), detail (a human-facing detail string, possibly empty). Value semantics (equatable)."
functions:
  - name: FileStatus.label
    signature: "(status: FileStatus) -> String"
    behavior: 'Returns the fixed render label for the status: Clean->"clean", PromptStale->"prompt-stale", Drift->"DRIFT", Unattributed->"unattributed". Total; one label per variant.'
  - name: FileStatus.is_error
    signature: "(status: FileStatus) -> Boolean"
    behavior: "Returns true when the status fails the CI gate: true for Drift and Unattributed, false for Clean and PromptStale."
  - name: StatusEntry.line
    signature: "(entry: StatusEntry) -> String"
    behavior: 'Renders the entry as one status line in the format "{label:<12} {file}{suffix}": the status label left-aligned and space- padded to a minimum width of 12 columns, one separating space, then file. suffix is empty when detail is empty (no trailing space, no parentheses), otherwise " ({detail})". Labels already >=12 chars get exactly one separating space. Byte-exact output.'
  - name: StatusEntry.is_error
    signature: "(entry: StatusEntry) -> Boolean"
    behavior: "Delegates to the entry's status: true for Drift and Unattributed, false for Clean and PromptStale."
tests:
  - name: labels_are_fixed
    given: Each FileStatus variant.
    expect: label() yields "clean", "prompt-stale", "DRIFT", "unattributed" respectively.
  - name: line_clean_empty_detail
    given: Entry with status Clean, file "examples/greeting.napl", empty detail.
    expect: line() equals "clean        examples/greeting.napl" (5-char label padded with 7 spaces to 12, then one separating space; no suffix).
  - name: line_prompt_stale_with_detail_has_single_separator
    given: Entry with status PromptStale, file "examples/greeting.napl", detail "never generated".
    expect: line() equals "prompt-stale examples/greeting.napl (never generated)" (12-char label, single separating space, detail in parentheses).
  - name: line_drift_with_detail
    given: 'Entry with status Drift, file "examples/greeting.napl", detail "typescript: x was edited".'
    expect: 'line() equals "DRIFT        examples/greeting.napl (typescript: x was edited)".'
  - name: line_unattributed_with_detail
    given: Entry with status Unattributed, file "examples/greeting.napl", detail "run napl gen typescript --force".
    expect: line() equals "unattributed examples/greeting.napl (run napl gen typescript --force)".
  - name: line_no_detail_has_no_trailing_space_or_parens
    given: Entry with status Drift, empty detail.
    expect: line() equals "DRIFT        examples/greeting.napl"; result does not end with a space and contains no "(".
  - name: line_exact_twelve_char_label_gets_single_separator
    given: PromptStale label (exactly 12 chars); entry with empty detail.
    expect: line() equals "prompt-stale examples/greeting.napl" (single separating space, no extra padding).
  - name: line_shorter_labels_pad_to_width_twelve
    given: Entry with status Clean, empty detail.
    expect: line() starts with the 13-char prefix "clean        " (label padded to 12 plus one separating space).
  - name: is_error_for_all_variants
    given: Each variant via both StatusEntry.is_error and FileStatus.is_error.
    expect: false for Clean and PromptStale; true for Drift and Unattributed, in both the entry and enum forms.
