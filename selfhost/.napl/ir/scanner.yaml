module: scanner
deps: []
types:
  - name: Position
    description: A zero-based document location with a line (count of lines from 0) and a character (count of UTF-16 code units within that line). Value type supporting equality and copy.
  - name: Span
    description: A source range with a start and end Position, inclusive in spirit on both ends. Value type supporting equality and copy.
  - name: RegionSpan
    description: A possibly-absent document region, with a present flag and an optional Span that is set when present is true.
  - name: FrontmatterKeyToken
    description: A frontmatter key occurrence, with the key string and a key_span covering the key text (colon excluded).
  - name: ModuleValueToken
    description: The resolved value of the module key, with the value string and its Span.
  - name: DepSource
    description: Enum distinguishing where a dependency was declared; variants Deps and Extends. Value type supporting equality and copy.
  - name: DepToken
    description: A single dependency entry, with the value string, its Span, and a source (DepSource) indicating deps vs extends origin.
  - name: RefToken
    description: An in-body @module/ref mention, with the referenced module string and the Span of the whole @name token.
  - name: ScanResult
    description: The complete scan output — frontmatter and body RegionSpans, a list of FrontmatterKeyTokens, an optional ModuleValueToken, a list of DepTokens, and a list of RefTokens.
  - name: Target
    description: Enum of a resolvable navigation target under a position; variants ModuleValue{module,span}, Dep{module,span,source}, and Ref{module,span}. Supports equality.
functions:
  - name: scan
    signature: "scan(text: string) -> ScanResult"
    behavior: "Pure; no I/O. Splits text into lines on newline, stripping a single trailing carriage return per segment so CRLF and LF behave identically (a trailing newline yields a final empty line). Detects a frontmatter block when the first line (trailing-whitespace-trimmed) equals exactly '---' and a later line (from line 1 on, trailing-trimmed) also equals '---' as the closing delimiter; inner lines are 1..close-1. When frontmatter exists, frontmatter region is present spanning (1,0) to (close-1, UTF-16 length of the last inner line), or (1,0)-(1,0) when there are no inner lines; the body begins at line close+1 and, when that line exists, spans (close+1,0) to (last line, UTF-16 length of last line), else the body is absent. With no frontmatter, frontmatter is absent and body is present whenever at least one line exists, spanning (0,0) to (last line, UTF-16 length of last line). Walks inner frontmatter lines to emit FrontmatterKeyTokens (key matches ^[A-Za-z0-9_-]+:), resolves module: as a scalar ModuleValueToken, and emits DepTokens from deps:/extends: whether inline list ([...] split on commas), single scalar, or block-list items (^\\s*-\\s+...). Scalar/list/item values measure leading whitespace in UTF-16 units and strip a single pair of matching surrounding ASCII quotes, shifting the start by one unit when stripped. Scans @module/ref mentions only within the body region (from close+1, or from line 0 when no frontmatter); a reference is an @ followed by one or more of [A-Za-z0-9_/-], its module being that run and its span covering the whole @name token in UTF-16 columns; a bare @ is not a reference. Returns the assembled ScanResult."
  - name: find_target_at_position
    signature: "find_target_at_position(scan: ScanResult, position: Position) -> Option<Target>"
    behavior: "Returns the token whose span contains position, tested in precedence order: the module value first, then each dep in order, then each ref in order. A span contains a position when the position is not before the span start nor after the span end, comparing line then character, inclusive on both ends. Returns nothing when no token contains the position."
tests:
  - name: main_doc_module_value
    given: The main reference document is scanned.
    expect: module_value is present with value 'auth/session' and span (1,8)-(1,20).
  - name: main_doc_deps
    given: The main reference document is scanned.
    expect: Exactly two deps; first value 'auth/tokens', source Deps, span (2,7)-(2,18); second value 'auth/users' with start (2,20) and end (2,30).
  - name: main_doc_refs
    given: The main reference document is scanned.
    expect: Body refs are 'auth/tokens', 'auth/users', 'auth/session' in order, with the first spanning (7,21)-(7,33).
  - name: main_doc_regions
    given: The main reference document is scanned.
    expect: Frontmatter present, starting at (1,0) with end on line 3; body present, starting on line 5.
  - name: main_doc_find_target
    given: The main reference document is scanned and positions (1,10), (2,10), (7,25), (5,0) are resolved.
    expect: (1,10) yields ModuleValue 'auth/session'; (2,10) yields Dep 'auth/tokens' with source Deps; (7,25) yields Ref 'auth/tokens'; (5,0) yields nothing.
  - name: block_list_document
    given: "The document '---\\nmodule: a\\ndeps:\\n  - one\\n  - \"two/x\"\\nextends: base\\n---\\nbody\\n' is scanned."
    expect: Deps are, by source, deps:one, deps:two/x, extends:base; 'one' spans (3,4)-(3,7), 'two/x' starts at (4,5), and 'base' starts at (5,9).
  - name: empty_inline_deps
    given: "The document '---\\nmodule: greeting\\ndeps: []\\n---\\nbody\\n' is scanned."
    expect: There are no deps and module_value is 'greeting'.
  - name: astral_prefix_ref
    given: "The document '---\\nmodule: m\\n---\\n😀😀@auth/x\\n' (two astral emoji before the @) is scanned."
    expect: One ref 'auth/x' starting at (3,4) and ending at (3,11), each emoji counting as 2 UTF-16 units.
  - name: bmp_prefix_ref
    given: "The document '---\\nmodule: m\\n---\\né@x/y\\n' (one BMP é before the @) is scanned."
    expect: The ref starts at (3,1), the é counting as 1 UTF-16 unit.
