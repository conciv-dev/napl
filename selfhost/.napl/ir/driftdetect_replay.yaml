module: driftdetect_replay
deps:
  - schemas_journal
  - text_diff
types: []
functions:
  - name: reconstruct_file_content
    signature: "reconstruct_file_content(entries: &[schemas_journal::JournalEntry], file_path: &str) -> Option<String>"
    behavior: Pure baseline reconstruction of a single file from journal patches. Considers every journal entry in ascending gen order (input is not assumed sorted and the caller's slice is not mutated; only a borrowed view is sorted). Starts with no accumulated content. For each entry in gen order, finds the file whose path equals file_path; if present, parses that file's patch into hunks and applies them to the current accumulated content (empty string when nothing accumulated yet), and the result becomes the new accumulated content. Returns the final accumulated content, or None if no entry ever contained file_path.
tests:
  - name: replays_two_patches_in_gen_order
    given: Two entries for "a.rs" — gen 1 inserting "line one", gen 2 appending "line two" — already in ascending gen order.
    expect: Reconstruction returns Some("line one\nline two").
  - name: sorts_out_of_order_entries_without_mutating_input
    given: Two entries for "a.rs" supplied out of gen order (gen 2 before gen 1).
    expect: Reconstruction returns Some("line one\nline two"), applying patches in ascending gen order, and the caller's input slice is left unchanged.
  - name: returns_none_for_untouched_path
    given: A single entry touching only "a.rs", queried for path "b.rs".
    expect: Reconstruction returns None.
  - name: ignores_files_from_other_entries_with_different_paths
    given: One entry containing two files, "a.rs" ("content a") and "b.rs" ("content b").
    expect: Querying "a.rs" returns Some("content a") and querying "b.rs" returns Some("content b"); each path is reconstructed only from its matching file.
  - name: three_entries_apply_in_ascending_gen_order
    given: Three entries for "a.rs" supplied out of order (gens 3, 1, 2), each appending one line.
    expect: Reconstruction returns Some("v1\nv2\nv3").
