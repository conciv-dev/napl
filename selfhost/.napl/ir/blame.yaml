module: blame
deps:
  - text_diff
types:
  - name: BlameSourceEntry
    description: "One recorded generation that touched a file. Comparable and cloneable. Public fields: gen (i64, the generation number), timestamp (string), module (string), patch (string, the unified-diff patch this generation applied to the file), prompt_diff (string, the diff of the prompt body at this generation)."
  - name: BlameLine
    description: "One blamed line of the current content. Comparable and cloneable. Public fields: line (usize, 1-based line number), gen (i64, the generation that last wrote the line), timestamp (string, that generation's timestamp), module (string, that generation's module), text (string, the line content)."
functions:
  - name: apply_patch_to_blame
    signature: "apply_patch_to_blame(blame: list<i64>, patch: string, gen: i64) -> list<i64>"
    behavior: "Replays one unified-diff patch against a per-line generation vector where blame[i] is the generation that wrote old line i, returning the new vector for the post-patch content. Precondition: patch is a unified diff parseable into hunks. Postconditions: if the patch has no hunks, returns the input vector unchanged. Otherwise walks a cursor over the old lines starting at 0; for each hunk it first copies untouched entries up to (but not including) the hunk's 1-based start (saturating at 0, staying within bounds) by pushing blame[old_idx] and advancing; then processes the hunk's lines in order: a context line pushes blame[old_idx] (or gen if past the end) and advances the cursor, a deletion line advances the cursor without pushing, an insertion line pushes gen without advancing. After the last hunk, any remaining blame entries are appended in order. Inserted lines are tagged with gen."
  - name: blame_file
    signature: "blame_file(history: list<BlameSourceEntry>, current_content: string) -> list<BlameLine>"
    behavior: "Computes line-level generation ancestry for a file's current content given its recorded history. Sorts a copy of history ascending by gen, then folds the patches: starting from an empty blame vector, sets blame = apply_patch_to_blame(blame, entry.patch, entry.gen) for each entry in ascending order. Chooses a fallback generation equal to the highest-gen entry's gen, or 0 if history is empty. For each line of the content at 0-based index, its generation is blame[index] if present else the fallback; produces a BlameLine with line = index + 1, that gen, the timestamp and module of the entry whose gen matches (empty strings if no such entry), and text = the line. Line splitting follows text_diff.to_lines semantics (empty content yields no lines; a single trailing terminator removed)."
  - name: blame_line_at
    signature: "blame_line_at(history: list<BlameSourceEntry>, current_content: string, line: usize) -> optional<BlameLine>"
    behavior: Returns the single BlameLine whose line field equals the given 1-based line number, computed via blame_file, or none if the line is out of range.
  - name: first_prompt_diff_line
    signature: "first_prompt_diff_line(prompt_diff: string) -> string"
    behavior: Scans the prompt diff's lines, stripping a trailing carriage return from each. Ignores everything until the first hunk header (a line starting with '@@'), and skips header lines themselves. For each remaining line, takes its text as everything after the first character (the marker) trimmed, skipping lines whose trimmed text is empty. Returns the first added line's text (marker '+') if any; otherwise the first removed line's text (marker '-'); otherwise the empty string.
tests:
  - name: apply_patch_to_blame_empty_patch_returns_unchanged
    given: A blame vector [1, 1, 2] and an empty patch with gen 3.
    expect: The result equals the input vector [1, 1, 2] unchanged.
  - name: apply_patch_to_blame_pure_insertion_into_empty
    given: An empty blame vector and a patch that is the diff from empty text to 'a\nb\n', with gen 1.
    expect: The result is [1, 1] — both inserted lines tagged with gen 1.
  - name: apply_patch_to_blame_context_lines_preserve_gen
    given: Blame vector [1, 1, 1] for content 'a\nb\nc\n' and a patch changing the middle line to 'a\nB\nc\n', with gen 2.
    expect: The result is [1, 2, 1] — context lines keep gen 1, the changed line takes gen 2.
  - name: apply_patch_to_blame_deletion_removes_entry
    given: Blame vector [1, 1, 1] for content 'a\nb\nc\n' and a patch deleting the middle line producing 'a\nc\n', with gen 2.
    expect: The result is [1, 1] — the deleted line's entry is removed.
  - name: apply_patch_to_blame_trailing_untouched_lines_preserved
    given: Blame vector [1, 1, 1, 1] for content 'a\nb\nc\nd\n' and a patch changing the first line to 'A\nb\nc\nd\n', with gen 2.
    expect: The result is [2, 1, 1, 1] — the changed line takes gen 2, trailing untouched lines keep gen 1.
  - name: blame_file_empty_history_uses_fallback_zero
    given: Empty history and content 'a\nb\n'.
    expect: Two blame lines; the first has gen 0, empty timestamp, empty module, text 'a'; the second has line 2.
  - name: blame_file_single_generation
    given: History with one entry gen 1, timestamp 't1', module 'mod1', patch diffing empty to 'a\nb\n'; content 'a\nb\n'.
    expect: Two blame lines, both with gen 1, timestamp 't1', module 'mod1'; texts 'a' and 'b'.
  - name: blame_file_multiple_generations_out_of_order_input
    given: "History provided out of ascending order: entry gen 2 (module 'mod2') patching 'a\\nb\\nc\\n' to 'a\\nB\\nc\\n', and entry gen 1 (module 'mod1') diffing empty to 'a\\nb\\nc\\n'; content 'a\\nB\\nc\\n'."
    expect: Three blame lines; line 1 gen 1 module 'mod1', line 2 gen 2 module 'mod2', line 3 gen 1 — history is sorted ascending before folding.
  - name: blame_line_at_returns_correct_line
    given: History with one entry gen 1 diffing empty to 'a\nb\nc\n'; content 'a\nb\nc\n'; requested line 2.
    expect: Some BlameLine with line 2 and text 'b'.
  - name: blame_line_at_out_of_range_returns_none
    given: Empty history, content 'a\nb\n', and requested line 5.
    expect: None, since the line is out of range.
  - name: first_prompt_diff_line_prefers_added_over_removed
    given: A diff with header lines, a hunk header, then '-old line', '+new line', ' context'.
    expect: Returns 'new line' — the added line is preferred over the removed line.
  - name: first_prompt_diff_line_falls_back_to_removed
    given: A diff with header lines, a hunk header, then '-removed line', ' context' and no added line.
    expect: Returns 'removed line' — falls back to the removed line when there is no added line.
  - name: first_prompt_diff_line_no_hunk_returns_empty
    given: A diff containing only file header lines ('--- a', '+++ b') and no hunk header.
    expect: Returns the empty string.
  - name: first_prompt_diff_line_skips_empty_lines_and_header
    given: A diff starting with a hunk header, then a context line ' ', an added line '+  ' (whitespace only), and '+actual content'.
    expect: Returns 'actual content' — empty and whitespace-only lines are skipped.
  - name: first_prompt_diff_line_no_changes_returns_empty
    given: A diff with a hunk header and only a context line ' context only'.
    expect: Returns the empty string — no added or removed lines.
  - name: first_prompt_diff_line_strips_trailing_cr
    given: "A diff with CRLF line endings: hunk header then '+added\\r'."
    expect: Returns 'added' — the trailing carriage return is stripped.
