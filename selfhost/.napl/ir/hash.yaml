module: hash
deps: []
types: []
functions:
  - name: content_hash
    signature: "content_hash(content: string) -> string"
    behavior: "Pure function, no I/O and no dependencies on other project modules. Returns the SHA-256 digest of the UTF-8 bytes of `content`, encoded as a lowercase hexadecimal string. Deterministic: identical input always yields the identical digest. Distinguishing: different inputs yield different digests. Shape: result is always exactly 64 characters, each a lowercase hex digit (`0`-`9`, `a`-`f`), never uppercase. Must match a standard SHA-256 implementation (e.g. `hello` -> `2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824`).\n"
tests:
  - name: matches_known_sha256_vector
    given: content is the string "hello"
    expect: 'returns "2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"
'
  - name: deterministic_for_same_input
    given: content_hash called twice with the same string "some content"
    expect: both calls return the identical digest
  - name: distinguishes_different_inputs
    given: content_hash called with "some content" and with "other content"
    expect: the two digests are not equal
  - name: empty_string_hashes_to_64_char_digest
    given: content is the empty string ""
    expect: digest is 64 characters long and is stable across repeated calls
  - name: result_is_64_lowercase_hex_characters
    given: content is a non-ASCII string "Hello, World! 🦀"
    expect: digest is 64 characters long and every character is a lowercase hex digit (`0`-`9` or `a`-`f`)
