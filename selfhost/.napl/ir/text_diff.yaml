module: text_diff
deps: []
types:
  - name: HunkKind
    description: "Enumeration of the three kinds a hunk line may have: Context (line present in both before and after), Del (line removed from before), Ins (line added in after).\n"
  - name: HunkLine
    description: "A single line within a hunk. Public fields: kind (a HunkKind) and text (the line's content string, without its marker character).\n"
  - name: Hunk
    description: "A parsed unified-diff hunk. Public fields: old_start, old_count, new_start, new_count (all non-negative unsigned integers taken from the header), and lines (an ordered list of HunkLine).\n"
functions:
  - name: to_lines
    signature: "to_lines(text: string) -> list<string>"
    behavior: 'Splits text into owned line strings. Precondition: any string. Postcondition: empty text yields an empty list. Otherwise a single trailing terminator (either "\n" or "\r\n") is stripped first, then the remainder is split on each "\n"; a "\r" immediately preceding a split "\n" is consumed with it, but a lone "\r" not followed by "\n" remains inside the line content. So "a\nb\n" and "a\nb" both give ["a","b"], "a\r\nb\r\n" gives ["a","b"], "a\rb\n" gives ["a\rb"], and "a\n\nb\n" gives ["a","","b"].
'
  - name: unified_diff
    signature: "unified_diff(before: string, after: string) -> string"
    behavior: 'Equivalent to unified_diff_with_context with context = 3. Returns a unified diff string of the changes from before to after. Identical inputs yield "".
'
  - name: unified_diff_with_context
    signature: "unified_diff_with_context(before: string, after: string, context: uint) -> string"
    behavior: "Splits both inputs via to_lines and aligns them by longest-common-subsequence: matching lines are context, before-only lines are deletions, after-only lines are insertions. Each entry carries its 1-based before/after line number as applicable. Only entries within `context` positions of a deletion or insertion are emitted; consecutive emitted entries form one hunk. Each hunk begins with a header \"@@ -<oldStart>,<oldCount> +<newStart>,<newCount> @@\", where oldStart is the before line number of the hunk's first non-insertion entry (0 if none) and oldCount is the number of before-derived entries (context + deletions); newStart and newCount mirror this over after (context + insertions). Each entry follows on its own line prefixed by a marker: space for context, \"-\" for deletion, \"+\" for insertion, then the line text. All emitted lines are joined with \"\\n\". No change yields \"\". Postconditions: \"\" into \"a\\nb\\n\" gives \"@@ -0,0 +1,2 @@\\n+a\\n+b\"; \"a\\nb\\n\" into \"\" gives \"@@ -1,2 +0,0 @@\\n-a\\n-b\".\n"
  - name: parse_hunks
    signature: "parse_hunks(diff: string) -> list<Hunk>"
    behavior: "Parses hunks out of a unified-diff string. Precondition: any string. An empty or whitespace-only diff yields no hunks. The diff is split into lines the same CRLF-aware way as to_lines. A line matching header shape \"@@ -A,B +C,D @@\" (A, B, C, D non-negative integers) opens a new hunk with those four numbers and no lines. Any other line, while a hunk is open, becomes one of its lines: its first character selects kind (space -> Context, \"-\" -> Del, \"+\" -> Ins; any other first character is ignored) and the remainder after that character is the line's text. Lines before any header are ignored.\n"
  - name: apply_hunks
    signature: "apply_hunks(before: string, hunks: list<Hunk>) -> string"
    behavior: "Reconstructs the diff's target from before and parsed hunks. Splits before via to_lines and walks hunks in order. Before each hunk, copies original lines up to the hunk's start (start derived from old_start; a hunk with old_start 0 starts at the current position). For each hunk line: a Context line copies the corresponding original line — or falls back to the hunk line's own text if the original is exhausted — and advances the original position; a Del advances position without emitting; an Ins emits its text without advancing. After the last hunk, remaining original lines are copied. Result lines are joined with \"\\n\". Round-trip property: applying parse_hunks(unified_diff(before, after)) onto before reproduces to_lines(after) joined with \"\\n\".\n"
tests:
  - name: to_lines_empty
    given: text = ""
    expect: empty list of lines
  - name: to_lines_trailing_newline
    given: text = "a\nb\n" and text = "a\nb"
    expect: both yield ["a", "b"]
  - name: to_lines_crlf
    given: text = "a\r\nb\r\n" and text = "a\r\nb"
    expect: both yield ["a", "b"]
  - name: to_lines_lone_cr
    given: text = "a\rb\n"
    expect: single line ["a\rb"]
  - name: to_lines_no_trailing_newline
    given: text = "hello"
    expect: '["hello"]'
  - name: to_lines_blank_lines
    given: text = "a\n\nb\n"
    expect: '["a", "", "b"]'
  - name: unified_diff_empty_to_content
    given: before = "", after = "a\nb\n"
    expect: '"@@ -0,0 +1,2 @@\n+a\n+b"'
  - name: unified_diff_content_to_empty
    given: before = "a\nb\n", after = ""
    expect: '"@@ -1,2 +0,0 @@\n-a\n-b"'
  - name: unified_diff_identical
    given: before == after (e.g. "a\nb\n" or "")
    expect: empty string ""
  - name: unified_diff_mixed
    given: before = "a\nb\nc\nd\ne\n", after = "a\nb\nC\nd\ne\n"
    expect: '"@@ -1,5 +1,5 @@\n a\n b\n-c\n+C\n d\n e"'
  - name: unified_diff_insert_and_delete
    given: before = "one\ntwo\nthree\n", after = "one\ntwo-and-a-half\ntwo\nthree\n"; diff produced then parsed and reapplied
    expect: apply_hunks(before, parse_hunks(diff)) equals to_lines(after) joined with "\n"
  - name: unified_diff_with_context_narrow
    given: before = "a\nb\nc\nd\ne\nf\ng\nh\ni\n", after = "a\nB\nc\nd\ne\nf\ng\nH\ni\n", context = 1
    expect: 'two separate hunks: "@@ -1,3 +1,3 @@\n a\n-b\n+B\n c\n@@ -7,3 +7,3 @@\n g\n-h\n+H\n i"'
  - name: parse_hunks_example
    given: diff = "@@ -1,3 +1,3 @@\n a\n-b\n+B\n c"
    expect: one hunk with old_start=1, old_count=3, new_start=1, new_count=3 and line kinds Context, Del, Ins, Context carrying texts "a", "b", "B", "c"
  - name: parse_hunks_empty_and_whitespace
    given: diff = "" and diff = "   \n  \n"
    expect: no hunks in both cases
  - name: parse_hunks_ignores_unknown_lines
    given: diff = "@@ -1,1 +1,1 @@\n a\n?noise\n"
    expect: one hunk with a single Context line; the "?noise" line is ignored
  - name: apply_hunks_example
    given: before = "a\nb\nc\n", hunks parsed from "@@ -1,3 +1,3 @@\n a\n-b\n+B\n c"
    expect: '"a\nB\nc"'
  - name: apply_hunks_no_hunks_copies_all
    given: before = "a\nb\nc\n", hunks = []
    expect: '"a\nb\nc"'
  - name: roundtrip_property
    given: 'various before/after pairs including "" -> "a\nb\n", "a\nb\n" -> "", identical inputs, single-line change, insertion, two distant changes, full reversal "x\ny\nz\n" -> "z\ny\nx\n", full replacement, and "trailing" -> "trailing\nextra"
'
    expect: apply_hunks(before, parse_hunks(unified_diff(before, after))) equals to_lines(after) joined with "\n" for every pair
