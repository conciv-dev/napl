name: gen-rust-target
description: >
  A full gen happy path for the rust target: the fake coding agent writes one
  Rust source file, the faked `cargo test` gate passes, IR/attribution/machine-
  layer derivations succeed, the .rs file is treated as source, attributed, and
  locked 0444, and map.json / journal / attribution / mapl are written. Proves
  the rust target adapter drives the same loop as typescript with `cargo test`.
setup:
  .napl/lock.json: |
    {
      "model": "claude-sonnet-5",
      "backend": "claude-cli",
      "agent": {
        "preset": "claude"
      }
    }
  math.napl: |
    ---
    module: adder
    deps: []
    targets: [rust]
    tests: []
    ---
    Add two integers and return their sum.
script:
  agent:
    - files:
        src/lib.rs: |
          // GENERATED BY NAPL from math.napl — edit the prompt, not this file
          pub fn add(a: i64, b: i64) -> i64 {
              a + b
          }

          #[cfg(test)]
          mod tests {
              use super::*;

              #[test]
              fn adds_two_integers() {
                  assert_eq!(add(2, 3), 5);
              }
          }
      output: "implemented the adder module in Rust"
  ir:
    - |
      ```yaml
      module: adder
      deps: []
      types: []
      functions:
        - name: add
          signature: "add(a: i64, b: i64) -> i64"
          behavior: "Returns the sum of a and b"
      tests: []
      ```
  attribution:
    - |
      ```yaml
      - promptLines: [1, 1]
        file: src/lib.rs
        lines: [2, 4]
        note: "adds two integers"
      ```
  ml:
    - |
      ```yaml
      []
      ```
run: [gen, rust]
expect:
  exitCode: 0
  stdoutContains:
    - "gen     adder (rust)"
    - "  mode: full (no prior successful gen for this target)"
    - "  attempt 1/3: running coding agent"
    - "  attempt 1/3: tests passed"
    - "  attribution attempt 1/3: 1 mapping(s) valid"
    - "  attributed 1 file(s) to adder"
    - "  attribution: 1 mapping(s) -> .napl/attribution/adder.yaml"
    - "generated 1, skipped 0"
  agentInputs:
    - index: 0
      contains:
        - "You are a coding agent implementing the module \"adder\""
        - "Add two integers and return their sum."
        - "Target: a Rust library crate tested with `cargo test`."
        - "- Ensure \"cargo test\" passes from this directory before you finish."
  files:
    .napl/src/rust/src/lib.rs:
      mode: "0444"
      content: |
        // GENERATED BY NAPL from math.napl — edit the prompt, not this file
        pub fn add(a: i64, b: i64) -> i64 {
            a + b
        }

        #[cfg(test)]
        mod tests {
            use super::*;

            #[test]
            fn adds_two_integers() {
                assert_eq!(add(2, 3), 5);
            }
        }
    .napl/gen.lock:
      absent: true
    .napl/prompts-at-gen/adder.md:
      content: |
        Add two integers and return their sum.
    .napl/attribution/adder.yaml:
      contains:
        - "module: adder"
        - "target: rust"
        - "file: src/lib.rs"
        - "note: adds two integers"
    .napl/ir/adder.yaml:
      contains:
        - "module: adder"
        - "name: add"
    .napl/mapl/adder.mapl:
      content: |
        module: adder
        target: rust
        entries: []
    .napl/journal.jsonl:
      contains:
        - "\"module\":\"adder\""
        - "\"target\":\"rust\""
        - ".napl/src/rust/src/lib.rs"
    .napl/map.json:
      contains:
        - "\"adder\""
        - ".napl/src/rust/src/lib.rs"
        - "\"rust\""
