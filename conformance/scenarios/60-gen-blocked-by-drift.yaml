name: gen-blocked-by-drift
description: >
  A locked, attributed file was hand-edited so it no longer matches its recorded
  hash. napl gen (unforced) hard-blocks BEFORE running any agent: it prints the
  guided drift report — the drifted module and file, a reconstructed
  recorded-baseline -> current diff (replayed from the journal), and the three
  verbatim resolution commands — and exits non-zero.
setup:
  .napl/lock.json: |
    {
      "model": "claude-sonnet-5",
      "backend": "claude-cli"
    }
  examples/greeting.napl: |
    ---
    module: greeting
    deps: []
    targets: [typescript]
    tests: []
    ---
    Greet a person by name.
  .napl/src/typescript/greet.ts: "export const greet = (name: string): string => `HELLO, ${name}!`;\n"
  .napl/journal.jsonl: |
    {"gen":1,"timestamp":"2026-07-23T00:00:00.000Z","module":"greeting","target":"typescript","promptHash":"a89eecb1f31e12e98001c16dfa96c74cc9edfc11e24a4abcd54cfb2258c5d3e3","promptDiff":"","mode":"full","files":[{"path":".napl/src/typescript/greet.ts","patch":"@@ -0,0 +1,1 @@\n+export const greet = (name: string): string => `Hello, ${name}!`;","hashBefore":null,"hashAfter":"ba0fff9dc431972a2488987562dbf68bc99b9c991a3cdc7506f64eff6a703545"}]}
  .napl/map.json: |
    {
      "version": 2,
      "prompts": {
        "greeting": {
          "module": "greeting",
          "promptHash": "a89eecb1f31e12e98001c16dfa96c74cc9edfc11e24a4abcd54cfb2258c5d3e3",
          "declaredTargets": [
            "typescript"
          ],
          "targets": {
            "typescript": {
              "promptHashAtGen": "a89eecb1f31e12e98001c16dfa96c74cc9edfc11e24a4abcd54cfb2258c5d3e3",
              "files": [
                ".napl/src/typescript/greet.ts"
              ]
            }
          }
        }
      },
      "files": {
        ".napl/src/typescript/greet.ts": {
          "target": "typescript",
          "hash": "ba0fff9dc431972a2488987562dbf68bc99b9c991a3cdc7506f64eff6a703545",
          "prompts": [
            "greeting"
          ]
        }
      }
    }
run: [gen, typescript]
expect:
  exitCode: 1
  stdoutContains:
    - "drift detected"
    - "module greeting (typescript)"
    - ".napl/src/typescript/greet.ts (edited by hand)"
    - "recorded baseline -> current:"
    - "-export const greet = (name: string): string => `Hello, ${name}!`;"
    - "+export const greet = (name: string): string => `HELLO, ${name}!`;"
    - "1) napl reconcile greeting  — fold this edit back into your prompt"
    - "2) napl gen typescript --module greeting --force"
    - "3) edit the prompt to describe the change, then napl gen typescript"
  stderrContains:
    - "gen blocked"
  files:
    .napl/src/typescript/greet.ts:
      content: "export const greet = (name: string): string => `HELLO, ${name}!`;\n"
