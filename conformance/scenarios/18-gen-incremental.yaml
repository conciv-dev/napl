name: gen-incremental
description: >
  With a prior successful gen (prompt body + attribution on disk) and a changed
  prompt, gen takes the diff-scoped incremental path: the agent task it receives
  carries the prompt diff and the affected owned regions, and the journal records
  mode "incremental".
setup:
  .napl/lock.json: |
    {
      "model": "claude-sonnet-5",
      "backend": "claude-cli"
    }
  examples/greeting.napl: |
    ---
    module: greeting
    deps: []
    targets: [typescript]
    tests: []
    ---
    Greet a person by name, loudly.
  .napl/src/typescript/greet.ts: "export const greet = (name: string): string => `Hello, ${name}!`;\n"
  .napl/prompts-at-gen/greeting.md: |
    Greet a person by name.
  .napl/attribution/greeting.yaml: |
    module: greeting
    target: typescript
    entries:
      - promptLines: [1, 1]
        file: greet.ts
        lines: [1, 1]
        note: builds the greeting string
  .napl/map.json: |
    {
      "version": 2,
      "prompts": {
        "greeting": {
          "module": "greeting",
          "promptHash": "a89eecb1f31e12e98001c16dfa96c74cc9edfc11e24a4abcd54cfb2258c5d3e3",
          "declaredTargets": [
            "typescript"
          ],
          "targets": {
            "typescript": {
              "promptHashAtGen": "a89eecb1f31e12e98001c16dfa96c74cc9edfc11e24a4abcd54cfb2258c5d3e3",
              "files": [
                ".napl/src/typescript/greet.ts"
              ]
            }
          }
        }
      },
      "files": {
        ".napl/src/typescript/greet.ts": {
          "target": "typescript",
          "hash": "ba0fff9dc431972a2488987562dbf68bc99b9c991a3cdc7506f64eff6a703545",
          "prompts": [
            "greeting"
          ]
        }
      }
    }
script:
  agent:
    - files:
        greet.ts: "export const greet = (name: string): string => `HELLO, ${name}!`;\n"
      output: "applied the loudness change"
  ir:
    - |
      ```yaml
      module: greeting
      deps: []
      types: []
      functions: []
      tests: []
      ```
  attribution:
    - |
      ```yaml
      - promptLines: [1, 1]
        file: greet.ts
        lines: [1, 1]
        note: "builds the greeting string"
      ```
  ml:
    - |
      ```yaml
      []
      ```
run: [gen, typescript]
expect:
  exitCode: 0
  stdoutContains:
    - "mode: INCREMENTAL"
    - "generated 1, skipped 0"
  agentInputs:
    - index: 0
      contains:
        - "INCREMENTAL update"
        - "-Greet a person by name."
        - "+Greet a person by name, loudly."
        - "greet.ts lines 1-1"
  files:
    .napl/journal.jsonl:
      contains:
        - "\"mode\":\"incremental\""
    .napl/src/typescript/greet.ts:
      mode: "0444"
      content: "export const greet = (name: string): string => `HELLO, ${name}!`;\n"
