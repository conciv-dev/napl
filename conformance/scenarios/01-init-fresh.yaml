name: init-fresh
description: >
  napl init on an empty directory creates the .napl layout, a default lock.json
  (claude-sonnet-5 / claude-cli), an empty map.json, per-target guard docs
  (AGENTS.md + CLAUDE.md), the example greeting.napl prompt, a .claude/settings.json
  that denies Edit on .napl/src, and — with no git repo present — prints the no-git
  notice instead of installing a pre-commit hook.
run: [init]
expect:
  exitCode: 0
  stdout:
    - "create  {{CWD}}/.napl/lock.json (model: claude-sonnet-5, backend: claude-cli)"
    - "create  {{CWD}}/.napl/map.json"
    - "create  {{CWD}}/.napl/src/typescript/AGENTS.md"
    - "create  {{CWD}}/.napl/src/typescript/CLAUDE.md"
    - "create  {{CWD}}/.napl/src/react/AGENTS.md"
    - "create  {{CWD}}/.napl/src/react/CLAUDE.md"
    - "create  {{CWD}}/examples/greeting.napl"
    - "create  {{CWD}}/.claude/settings.json (deny Edit on .napl/src/**)"
    - 're:^note: no \.git directory found'
    - 're:^initialized\. Next: edit a \*\.napl prompt'
    - "gen runs a coding agent that writes the source directly, then derives the IR and attribution."
  files:
    .napl/lock.json:
      content: |
        {
          "model": "claude-sonnet-5",
          "backend": "claude-cli"
        }
    .napl/map.json:
      content: |
        {
          "version": 2,
          "prompts": {},
          "files": {}
        }
    .claude/settings.json:
      content: |
        {
          "permissions": {
            "deny": [
              "Edit(/.napl/src/**)"
            ]
          }
        }
    .napl/src/typescript/AGENTS.md:
      contains:
        - "GENERATED by NAPL"
        - "block compilation"
