name: init-guard-rails
description: >
  napl init in a project that has a .git directory installs the full guard-rail
  stack: per-target AGENTS.md/CLAUDE.md guard docs, a .claude/settings.json deny
  rule for .napl/src, and an executable .git/hooks/pre-commit that runs napl status
  and points at git commit --no-verify as the WIP escape hatch.
setup:
  .git/HEAD: "ref: refs/heads/main\n"
run: [init]
expect:
  exitCode: 0
  stdoutContains:
    - "create  {{CWD}}/.napl/src/typescript/AGENTS.md"
    - "create  {{CWD}}/.napl/src/react/CLAUDE.md"
    - "create  {{CWD}}/.claude/settings.json (deny Edit on .napl/src/**)"
    - "/.git/hooks/pre-commit (runs napl status; blocks commits on drift)"
  files:
    .napl/src/typescript/AGENTS.md:
      contains:
        - "GENERATED by NAPL"
        - "Direct edits are detected as DRIFT and block compilation."
    .claude/settings.json:
      content: |
        {
          "permissions": {
            "deny": [
              "Edit(/.napl/src/**)"
            ]
          }
        }
    .git/hooks/pre-commit:
      mode: "0755"
      contains:
        - "napl status"
        - "git commit --no-verify"
