name: gen-crate-grouping
description: >
  Declared crate grouping (frontmatter `crate:`): two rust modules (alpha, beta)
  both declare `crate: shared`, so their generated code lands in one member crate
  `shared` as src/alpha.rs and src/beta.rs. The toolchain writes and owns the
  crate's Cargo.toml and src/lib.rs (mod lines) — refreshed each gen, excluded
  from attribution, never locked — while each module owns its own source file
  (attributed and locked 0444). The workspace root lists `shared` once and the
  workspace-root cargo test gate passes.
setup:
  .napl/lock.json: |
    {
      "model": "claude-sonnet-5",
      "backend": "claude-cli",
      "agent": {
        "preset": "claude"
      }
    }
  alpha.napl: |
    ---
    module: alpha
    deps: []
    targets: [rust]
    crate: shared
    tests: []
    ---
    Add one to an integer.
  beta.napl: |
    ---
    module: beta
    deps: []
    targets: [rust]
    crate: shared
    tests: []
    ---
    Subtract one from an integer.
script:
  agent:
    - files:
        shared/src/alpha.rs: |
          pub fn inc(n: i64) -> i64 {
              n + 1
          }

          #[cfg(test)]
          mod tests {
              use super::*;

              #[test]
              fn increments() {
                  assert_eq!(inc(2), 3);
              }
          }
      output: "implemented alpha in the shared crate"
    - files:
        shared/src/beta.rs: |
          pub fn dec(n: i64) -> i64 {
              n - 1
          }

          #[cfg(test)]
          mod tests {
              use super::*;

              #[test]
              fn decrements() {
                  assert_eq!(dec(2), 1);
              }
          }
      output: "implemented beta in the shared crate"
  ir:
    - |
      ```yaml
      module: alpha
      deps: []
      types: []
      functions:
        - name: inc
          signature: "inc(n: i64) -> i64"
          behavior: "Returns n + 1"
      tests: []
      ```
    - |
      ```yaml
      module: beta
      deps: []
      types: []
      functions:
        - name: dec
          signature: "dec(n: i64) -> i64"
          behavior: "Returns n - 1"
      tests: []
      ```
  attribution:
    - |
      ```yaml
      - promptLines: [1, 1]
        file: shared/src/alpha.rs
        lines: [1, 3]
        note: "adds one"
      ```
    - |
      ```yaml
      - promptLines: [1, 1]
        file: shared/src/beta.rs
        lines: [1, 3]
        note: "subtracts one"
      ```
  ml:
    - |
      ```yaml
      []
      ```
    - |
      ```yaml
      []
      ```
run: [gen, rust]
expect:
  exitCode: 0
  stdoutContains:
    - "gen     alpha (rust)"
    - "  crate: alpha grouped into member crate 'shared' as src/alpha.rs (Cargo.toml + lib.rs toolchain-owned)"
    - "  attributed 1 file(s) to alpha"
    - "gen     beta (rust)"
    - "  crate: beta grouped into member crate 'shared' as src/beta.rs (Cargo.toml + lib.rs toolchain-owned)"
    - "  attributed 1 file(s) to beta"
    - "generated 2, skipped 0"
  agentInputs:
    - index: 0
      contains:
        - "CRATE GROUPING: this module groups into the shared member crate `shared`."
        - "Write your implementation ONLY to `shared/src/alpha.rs`."
  files:
    .napl/src/rust/shared/src/alpha.rs:
      mode: "0444"
      contains:
        - "pub fn inc"
    .napl/src/rust/shared/src/beta.rs:
      mode: "0444"
      contains:
        - "pub fn dec"
    .napl/src/rust/shared/src/lib.rs:
      content: |
        pub mod alpha;
        pub mod beta;
    .napl/src/rust/shared/Cargo.toml:
      contains:
        - "name = \"shared\""
    .napl/src/rust/Cargo.toml:
      contains:
        - "[workspace]"
        - "\"shared\","
    .napl/attribution/alpha.yaml:
      contains:
        - "file: shared/src/alpha.rs"
    .napl/attribution/beta.yaml:
      contains:
        - "file: shared/src/beta.rs"
    .napl/map.json:
      contains:
        - "\"alpha\""
        - "\"beta\""
        - ".napl/src/rust/shared/src/alpha.rs"
        - ".napl/src/rust/shared/src/beta.rs"
