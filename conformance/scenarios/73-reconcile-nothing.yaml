name: reconcile-nothing
description: >
  With no drift, napl reconcile is a clean no-op: it prints "nothing to
  reconcile" and exits 0 without running any agent or touching state.
setup:
  .napl/lock.json: |
    {
      "model": "claude-sonnet-5",
      "backend": "claude-cli"
    }
  examples/greeting.napl: |
    ---
    module: greeting
    deps: []
    targets: [typescript]
    tests: []
    ---
    Greet a person by name.
  .napl/src/typescript/greet.ts: "export const greet = (name: string): string => `Hello, ${name}!`;\n"
  .napl/map.json: |
    {
      "version": 2,
      "prompts": {
        "greeting": {
          "module": "greeting",
          "promptHash": "a89eecb1f31e12e98001c16dfa96c74cc9edfc11e24a4abcd54cfb2258c5d3e3",
          "declaredTargets": [
            "typescript"
          ],
          "targets": {
            "typescript": {
              "promptHashAtGen": "a89eecb1f31e12e98001c16dfa96c74cc9edfc11e24a4abcd54cfb2258c5d3e3",
              "files": [
                ".napl/src/typescript/greet.ts"
              ]
            }
          }
        }
      },
      "files": {
        ".napl/src/typescript/greet.ts": {
          "target": "typescript",
          "hash": "ba0fff9dc431972a2488987562dbf68bc99b9c991a3cdc7506f64eff6a703545",
          "prompts": [
            "greeting"
          ]
        }
      }
    }
run: [reconcile, typescript]
expect:
  exitCode: 0
  stdout:
    - "nothing to reconcile — no drifted files for target 'typescript'."
