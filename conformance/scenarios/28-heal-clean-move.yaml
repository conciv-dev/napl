name: heal-clean-move
description: >
  Generated-file healing (clean move): the map tracks greet.ts at one path, but a
  hand mv relocated it into a subdirectory with byte-identical content. Status
  finds the map's path missing, matches the untracked file by exact content hash,
  heals the path in the map, journals a `move` entry, and relocks the file 0444 —
  status stays clean, exit 0. No false "deleted + unattributed".
setup:
  .napl/lock.json: |
    {
      "model": "claude-sonnet-5",
      "backend": "claude-cli"
    }
  examples/greeting.napl: |
    ---
    module: greeting
    deps: []
    targets: [typescript]
    tests: []
    ---
    Greet a person by name.
  .napl/src/typescript/greetings/greet.ts: "export const greet = (name: string): string => `Hello, ${name}!`;\n"
  .napl/map.json: |
    {
      "version": 2,
      "prompts": {
        "greeting": {
          "module": "greeting",
          "promptHash": "a89eecb1f31e12e98001c16dfa96c74cc9edfc11e24a4abcd54cfb2258c5d3e3",
          "declaredTargets": [
            "typescript"
          ],
          "targets": {
            "typescript": {
              "promptHashAtGen": "a89eecb1f31e12e98001c16dfa96c74cc9edfc11e24a4abcd54cfb2258c5d3e3",
              "files": [
                ".napl/src/typescript/greet.ts"
              ]
            }
          }
        }
      },
      "files": {
        ".napl/src/typescript/greet.ts": {
          "target": "typescript",
          "hash": "ba0fff9dc431972a2488987562dbf68bc99b9c991a3cdc7506f64eff6a703545",
          "prompts": [
            "greeting"
          ]
        }
      }
    }
run: [status]
expect:
  exitCode: 0
  stdout:
    - "clean        examples/greeting.napl"
  files:
    .napl/journal.jsonl:
      contains:
        - "\"mode\":\"move\""
        - ".napl/src/typescript/greetings/greet.ts"
    .napl/map.json:
      contains:
        - ".napl/src/typescript/greetings/greet.ts"
    .napl/src/typescript/greetings/greet.ts:
      mode: "0444"
