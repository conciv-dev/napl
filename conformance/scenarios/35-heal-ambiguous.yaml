name: heal-ambiguous
description: >
  Generated-file healing refuses to guess: the map's tracked greet.ts is missing,
  and two untracked files carry byte-identical content (both hash-match the lost
  file). The move is ambiguous, so status hard-errors naming the candidates
  rather than silently healing to one of them.
setup:
  .napl/lock.json: |
    {
      "model": "claude-sonnet-5",
      "backend": "claude-cli"
    }
  examples/greeting.napl: |
    ---
    module: greeting
    deps: []
    targets: [typescript]
    tests: []
    ---
    Greet a person by name.
  .napl/src/typescript/one/greet.ts: "export const greet = (name: string): string => `Hello, ${name}!`;\n"
  .napl/src/typescript/two/greet.ts: "export const greet = (name: string): string => `Hello, ${name}!`;\n"
  .napl/map.json: |
    {
      "version": 2,
      "prompts": {
        "greeting": {
          "module": "greeting",
          "promptHash": "a89eecb1f31e12e98001c16dfa96c74cc9edfc11e24a4abcd54cfb2258c5d3e3",
          "declaredTargets": [
            "typescript"
          ],
          "targets": {
            "typescript": {
              "promptHashAtGen": "a89eecb1f31e12e98001c16dfa96c74cc9edfc11e24a4abcd54cfb2258c5d3e3",
              "files": [
                ".napl/src/typescript/greet.ts"
              ]
            }
          }
        }
      },
      "files": {
        ".napl/src/typescript/greet.ts": {
          "target": "typescript",
          "hash": "ba0fff9dc431972a2488987562dbf68bc99b9c991a3cdc7506f64eff6a703545",
          "prompts": [
            "greeting"
          ]
        }
      }
    }
run: [status]
expect:
  exitCode: 1
  stderrContains:
    - "cannot heal moved file '.napl/src/typescript/greet.ts'"
    - "identical content"
    - ".napl/src/typescript/one/greet.ts"
    - ".napl/src/typescript/two/greet.ts"
